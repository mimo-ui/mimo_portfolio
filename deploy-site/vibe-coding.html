    <script>
      (function initVibeScreenController() {
        const screenOrder = ["first", "liquid", "astrodither", "utopia", "widgets"];
        const screenFrames = {
          liquid: document.querySelector(".liquid-screen iframe[data-src]"),
          astrodither: document.querySelector(".astrodither-screen iframe[data-src]"),
          utopia: document.querySelector(".utopia-screen iframe[data-src]"),
          widgets: document.querySelector(".widgets-screen iframe[data-src]"),
        };
        let activeScreen = "first";
        let transitionLocked = false;

        function getScreenIndex() {
          return Math.max(0, screenOrder.indexOf(activeScreen));
        }

        function loadScreenFrame(screen) {
          const frame = screenFrames[screen];
          if (frame && !frame.src) {
            frame.src = frame.dataset.src;
          }
        }

        function syncFrameActivity() {
          Object.entries(screenFrames).forEach(([screen, frame]) => {
            if (!frame || !frame.contentWindow) return;
            frame.contentWindow.postMessage({
              type: "vibe-frame-active",
              active: screen === activeScreen,
            }, "*");
          });
        }

        function applyScreenClass(screen) {
          const activeIndex = Math.max(0, screenOrder.indexOf(screen));
          document.body.classList.toggle("show-liquid", activeIndex >= screenOrder.indexOf("liquid"));
          document.body.classList.toggle("show-astrodither", activeIndex >= screenOrder.indexOf("astrodither"));
          document.body.classList.toggle("show-utopia", activeIndex >= screenOrder.indexOf("utopia"));
          document.body.classList.toggle("show-widgets", activeIndex >= screenOrder.indexOf("widgets"));
          document.body.classList.toggle("active-first", screen === "first");
          document.body.classList.toggle("active-liquid", screen === "liquid");
          document.body.classList.toggle("active-astrodither", screen === "astrodither");
          document.body.classList.toggle("active-utopia", screen === "utopia");
          document.body.classList.toggle("active-widgets", screen === "widgets");
        }

        function preloadScreenFrame(screen) {
          const preload = () => loadScreenFrame(screen);
          if ("requestIdleCallback" in window) {
            window.requestIdleCallback(preload, { timeout: 1200 });
            return;
          }
          window.setTimeout(preload, 600);
        }

        function setActiveScreen(screen) {
          if (transitionLocked || activeScreen === screen || !screenOrder.includes(screen)) return;
          transitionLocked = true;
          document.body.classList.add("vibe-transitioning");
          activeScreen = screen;
          if (screen !== "first") loadScreenFrame(screen);
          if (screen === "liquid") loadScreenFrame("astrodither");
          if (screen === "astrodither") loadScreenFrame("utopia");
          if (screen === "utopia") loadScreenFrame("widgets");
          applyScreenClass(screen);
          syncFrameActivity();
          window.clearTimeout(setActiveScreen.unlockTimer);
          setActiveScreen.unlockTimer = window.setTimeout(() => {
            transitionLocked = false;
            document.body.classList.remove("vibe-transitioning");
          }, 760);
        }

        function goToNextScreen() {
          const nextIndex = Math.min(screenOrder.length - 1, getScreenIndex() + 1);
          setActiveScreen(screenOrder[nextIndex]);
        }

        function goToPreviousScreen() {
          const previousIndex = Math.max(0, getScreenIndex() - 1);
          setActiveScreen(screenOrder[previousIndex]);
        }

        function stepScreen(direction) {
          if (direction > 0) goToNextScreen();
          if (direction < 0) goToPreviousScreen();
        }

        function consumeWheel(event) {
          if (Math.abs(event.deltaY) < 8) return;
          event.preventDefault();
          event.stopPropagation();
          if (event.stopImmediatePropagation) event.stopImmediatePropagation();
          stepScreen(event.deltaY > 0 ? 1 : -1);
        }

        function bindFrameNavigation(screen) {
          if (screen === "liquid" || screen === "utopia" || screen === "widgets") return;
          const frame = screenFrames[screen];
          if (!frame || frame.dataset.navigationBound === "true") return;
          let frameDoc;
          try {
            frameDoc = frame.contentDocument || frame.contentWindow.document;
          } catch (error) {
            return;
          }
          if (!frameDoc) return;
          frame.dataset.navigationBound = "true";
          [frameDoc.defaultView, frameDoc, frameDoc.body].filter(Boolean).forEach((target) => {
            target.addEventListener("wheel", consumeWheel, { passive: false, capture: true });
            target.addEventListener("mousewheel", consumeWheel, { passive: false, capture: true });
          });

          let touchStartY = 0;
          frameDoc.addEventListener("touchstart", (event) => {
            touchStartY = event.touches[0] ? event.touches[0].clientY : 0;
          }, { passive: true, capture: true });
          frameDoc.addEventListener("touchmove", (event) => {
            const currentY = event.touches[0] ? event.touches[0].clientY : touchStartY;
            const delta = touchStartY - currentY;
            if (Math.abs(delta) < 24) return;
            event.preventDefault();
            event.stopPropagation();
            if (event.stopImmediatePropagation) event.stopImmediatePropagation();
            stepScreen(delta > 0 ? 1 : -1);
          }, { passive: false, capture: true });
        }

        Object.entries(screenFrames).forEach(([screen, frame]) => {
          if (frame) frame.addEventListener("load", () => {
            bindFrameNavigation(screen);
            syncFrameActivity();
          });
        });

        applyScreenClass(activeScreen);
        window.setTimeout(() => preloadScreenFrame("liquid"), 120);
        window.setTimeout(() => preloadScreenFrame("astrodither"), 700);
        window.setTimeout(() => preloadScreenFrame("utopia"), 1300);
        window.setTimeout(() => preloadScreenFrame("widgets"), 2100);

        [window, document, document.body].forEach((target) => {
          target.addEventListener("wheel", consumeWheel, { passive: false, capture: true });
          target.addEventListener("mousewheel", consumeWheel, { passive: false, capture: true });
        });

        window.addEventListener("message", (event) => {
          if (!event.data || event.data.type !== "vibe-screen-step") return;
          if (event.data.source && event.data.source !== activeScreen) return;
          stepScreen(Number(event.data.direction) > 0 ? 1 : -1);
        });

        let pageTouchStartY = 0;
        window.addEventListener("touchstart", (event) => {
          pageTouchStartY = event.touches[0] ? event.touches[0].clientY : 0;
        }, { passive: true, capture: true });
        window.addEventListener("touchmove", (event) => {
          const currentY = event.touches[0] ? event.touches[0].clientY : pageTouchStartY;
          const delta = pageTouchStartY - currentY;
          if (Math.abs(delta) < 24) return;
          event.preventDefault();
          event.stopPropagation();
          if (event.stopImmediatePropagation) event.stopImmediatePropagation();
          stepScreen(delta > 0 ? 1 : -1);
        }, { passive: false, capture: true });

        window.__vibeScreen = {
          get active() { return activeScreen; },
          next: goToNextScreen,
          previous: goToPreviousScreen,
          set: setActiveScreen,
        };
      })();
    </script>

      {
        "imports": {

    <script type="module">
import * as THREE from "three";
      import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
      import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
      import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";
      import { OutputPass } from "three/addons/postprocessing/OutputPass.js";

      const app = document.getElementById("app");
      const fallback = document.getElementById("fallback");

      function createProjectedFloor(width, depth, material, segments = 64) {
        const geometry = new THREE.PlaneGeometry(width, depth, segments, segments);
        geometry.rotateX(-Math.PI / 2);
        return new THREE.Mesh(geometry, material);
      }

      function createKeyboard(material) {
        const group = new THREE.Group();
        const baseGeo = new THREE.BoxGeometry(1.15, 0.045, 0.42);
        const base = new THREE.Mesh(baseGeo, material);
        base.position.y = 0.0225;
        group.add(base);

        const cols = 10;
        const rows = 3;
        const keyW = 0.09;
        const keyH = 0.072;
        const keyD = 0.07;
        const gapX = 0.012;
        const gapZ = 0.01;
        const startX = -((cols - 1) * (keyW + gapX)) / 2;
        const startZ = -((rows - 1) * (keyD + gapZ)) / 2;
        const keyGeo = new THREE.BoxGeometry(keyW, keyH, keyD);

        for (let rz = 0; rz < rows; rz += 1) {
          for (let cx = 0; cx < cols; cx += 1) {
            const key = new THREE.Mesh(keyGeo, material);
            key.position.set(
              startX + cx * (keyW + gapX),
              0.045 + keyH * 0.5 + 0.002,
              startZ + rz * (keyD + gapZ)
            );
            group.add(key);
          }
        }

        group.position.set(0, 0, 1.28);
        return group;
      }

      const VERT = `
varying vec2 vUv;
void main() {
  vUv = uv;
  gl_Position = vec4(position.xy, 0.0, 1.0);
}
`;

      const FRAG = `
precision highp float;
varying vec2 vUv;
uniform float uTime;
uniform float uProjectionIntensity;
uniform float uReflectionGain;
uniform float uHighlightBoost;
uniform float uLumaVisibilityThreshold;
uniform float uInvertColor;
uniform float uHalftone;
uniform float uToneCut;

vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
vec2 mod289(vec2 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
vec3 permute(vec3 x) { return mod289(((x * 34.0) + 1.0) * x); }

float snoise(vec2 v) {
  const vec4 C = vec4(
    0.211324865405187,
    0.366025403784439,
    -0.577350269189626,
    0.024390243902439
  );
  vec2 i = floor(v + dot(v, C.yy));
  vec2 x0 = v - i + dot(i, C.xx);
  vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
  vec4 x12 = x0.xyxy + C.xxzz;
  x12.xy -= i1;
  i = mod289(i);
  vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0)) + i.x + vec3(0.0, i1.x, 1.0));
  vec3 m = max(0.5 - vec3(dot(x0, x0), dot(x12.xy, x12.xy), dot(x12.zw, x12.zw)), 0.0);
  m = m * m;
  m = m * m;
  vec3 x = 2.0 * fract(p * C.www) - 1.0;
  vec3 h = abs(x) - 0.5;
  vec3 ox = floor(x + 0.5);
  vec3 a0 = x - ox;
  m *= 1.79284291400159 - 0.85373472095314 * (a0 * a0 + h * h);
  vec3 g;
  g.x = a0.x * x0.x + h.x * x0.y;
  g.yz = a0.yz * x12.xz + h.yz * x12.yw;
  return 130.0 * dot(m, g);
}

float fbm(vec2 p) {
  float v = 0.0;
  float a = 0.5;
  for (int i = 0; i < 5; i++) {
    v += a * snoise(p);
    p = p * 2.0 + vec2(17.0, 31.0);
    a *= 0.5;
  }
  return v;
}

void main() {
  vec2 uv = vUv;
  vec2 p = uv * 2.0 - 1.0;
  float t = uTime;

  vec2 flow = vec2(t * 0.19, t * 0.13);
  vec2 q = vec2(
    fbm(p * 1.05 + flow),
    fbm(p * 1.05 + vec2(-flow.y * 1.1, flow.x * 0.9))
  );
  vec2 w = p + q * 0.62;

  float nA = 0.5 + 0.5 * fbm(w * 2.15 + flow * 0.8);
  float nB = 0.5 + 0.5 * fbm(w * 4.8 + vec2(-flow.x * 0.5, flow.y * 0.35));
  float ridge = 1.0 - abs(2.0 * nB - 1.0);
  float mask = clamp(0.18 + 1.12 * (0.58 * nA + 0.42 * ridge), 0.0, 1.0);
  float edgeFade = 1.0 - clamp(length(p) * 0.7, 0.0, 1.0);
  float intensity = pow(clamp(mask * (0.72 + edgeFade * 0.45), 0.0, 1.0), 1.05);

  float base = nA * 0.82 + ridge * 0.18;
  vec3 col = vec3(
    0.18 + 0.86 * (0.5 + 0.5 * cos(6.28318 * (base + 0.02 + t * 0.07))),
    0.14 + 0.9  * (0.5 + 0.5 * cos(6.28318 * (base + 0.37 + t * 0.06))),
    0.2  + 0.9  * (0.5 + 0.5 * cos(6.28318 * (base + 0.72 + t * 0.065)))
  );
  col *= intensity;

  float highlight = pow(clamp((nA * 1.1 + ridge * 0.75) - 1.1, 0.0, 1.0), 2.2);
  col = mix(col, vec3(1.0, 0.96, 0.92), highlight * vec3(0.22, 0.16, 0.1));
  vec3 tex = clamp(col, 0.0, 1.0);

  if (uInvertColor > 0.5) {
    tex = vec3(1.0) - tex;
  }

  if (uToneCut > 0.5) {
    float toneLevels = 5.0;
    tex = floor(tex * (toneLevels - 1.0) + 0.5) / (toneLevels - 1.0);
  }

  float lum = dot(tex, vec3(0.2126, 0.7152, 0.0722));
  float lumaStart = clamp(uLumaVisibilityThreshold, 0.0, 1.0);
  float lumaEnd = min(1.0, lumaStart + 0.1);
  float darkMask = 1.0;
  if (lumaStart > 1e-4) {
    darkMask = smoothstep(lumaStart, lumaEnd, lum);
  }

  if (uHalftone > 0.5) {
    vec2 hUv = vUv * vec2(180.0, 120.0);
    vec2 hCell = fract(hUv) - 0.5;
    float dotRadius = mix(0.02, 0.45, clamp(lum, 0.0, 1.0));
    float dotMask = 1.0 - smoothstep(dotRadius, dotRadius + 0.035, length(hCell));
    tex *= dotMask * darkMask;
  }

  float hi = smoothstep(0.5, 1.0, lum);
  tex *= darkMask;
  tex *= mix(1.0, uHighlightBoost, hi);
  tex *= max(0.0, uProjectionIntensity) * max(0.0, uReflectionGain);

  gl_FragColor = vec4(tex, 1.0);
}
`;

      function createGradientRenderSource(width = 1024, height = 576) {
        const w = Math.max(2, Math.floor(width));
        const h = Math.max(2, Math.floor(height));
        const sourceScene = new THREE.Scene();
        const sourceCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const sourceMaterial = new THREE.ShaderMaterial({
          vertexShader: VERT,
          fragmentShader: FRAG,
          uniforms: {
            uTime: { value: 0 },
            uProjectionIntensity: { value: 0.5 },
            uReflectionGain: { value: 1.0 },
            uHighlightBoost: { value: 1.65 },
            uLumaVisibilityThreshold: { value: 0.3 },
            uInvertColor: { value: 0 },
            uHalftone: { value: 0 },
            uToneCut: { value: 0 },
          },
          depthTest: false,
          depthWrite: false,
        });
        const sourceQuad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), sourceMaterial);
        sourceScene.add(sourceQuad);

        const target = new THREE.WebGLRenderTarget(w, h, {
          minFilter: THREE.LinearFilter,
          magFilter: THREE.LinearFilter,
          format: THREE.RGBAFormat,
          type: THREE.UnsignedByteType,
          colorSpace: THREE.SRGBColorSpace,
          depthBuffer: false,
          stencilBuffer: false,
        });

        return {
          texture: target.texture,
          render(renderer, timeSec) {
            const prevTarget = renderer.getRenderTarget();
            const prevXr = renderer.xr.enabled;
            renderer.xr.enabled = false;
            sourceMaterial.uniforms.uTime.value = timeSec;
            renderer.setRenderTarget(target);
            renderer.clear();
            renderer.render(sourceScene, sourceCamera);
            renderer.setRenderTarget(prevTarget);
            renderer.xr.enabled = prevXr;
          },
          setEffects(effects) {
            sourceMaterial.uniforms.uProjectionIntensity.value = effects.projectionIntensity;
            sourceMaterial.uniforms.uReflectionGain.value = effects.reflectionGain;
            sourceMaterial.uniforms.uHighlightBoost.value = effects.highlightBoost;
            sourceMaterial.uniforms.uLumaVisibilityThreshold.value = effects.lumaVisibilityThreshold;
            sourceMaterial.uniforms.uInvertColor.value = effects.invertColor ? 1 : 0;
            sourceMaterial.uniforms.uHalftone.value = effects.halftone ? 1 : 0;
            sourceMaterial.uniforms.uToneCut.value = effects.toneCut ? 1 : 0;
          },
          dispose() {
            sourceQuad.geometry.dispose();
            sourceMaterial.dispose();
            target.dispose();
          },
        };
      }

      function createScreen(texture) {
        const geometry = new THREE.PlaneGeometry(2, 1.3);
        const material = new THREE.MeshBasicMaterial({
          map: texture,
          toneMapped: false,
          side: THREE.DoubleSide,
        });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.set(0, 1.0, 0.5);
        return { mesh };
      }

      function getAppSize() {
        return {
          width: app.clientWidth || window.innerWidth,
          height: app.clientHeight || window.innerHeight,
        };
      }

      function createBloomComposer(renderer, scene, camera) {
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        const appSize = getAppSize();
        const bloomPass = new UnrealBloomPass(
          new THREE.Vector2(appSize.width, appSize.height),
          0.22,
          0.42,
          0.72
        );
        composer.addPass(bloomPass);
        composer.addPass(new OutputPass());
        return { composer, bloomPass };
      }

      const testCanvas = document.createElement("canvas");
      const gl2 = testCanvas.getContext("webgl2");
      const gl = gl2 ?? testCanvas.getContext("webgl");
      if (!gl) {
        console.error("[WebGL] Context create failed");
        fallback.style.display = "grid";
        throw new Error("WebGL unavailable");
      }

      const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
      const initialSize = getAppSize();
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(initialSize.width, initialSize.height);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 0.78;
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;

      renderer.domElement.addEventListener("webglcontextlost", (event) => {
        event.preventDefault();
        console.error("[WebGL] Context lost:", event);
        if (rafId !== null) cancelAnimationFrame(rafId);
      });

      console.info("[Renderer] WebGL version:", renderer.capabilities.isWebGL2 ? 2 : 1);
      console.info("[Renderer] Max textures:", renderer.capabilities.maxTextures);
      app.appendChild(renderer.domElement);

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x101014);

      const camera = new THREE.PerspectiveCamera(45, initialSize.width / initialSize.height, 0.1, 100);
      camera.position.set(0, 1.2, 5.5);
      camera.lookAt(0, 0.8, 0);

      const screenGradientSource = createGradientRenderSource(1024, 576);
      const projectionGradientSource = createGradientRenderSource(1024, 576);
      screenGradientSource.setEffects({
        projectionIntensity: 1,
        reflectionGain: 1,
        highlightBoost: 1,
        lumaVisibilityThreshold: 0,
        invertColor: false,
        halftone: false,
        toneCut: false,
      });
      screenGradientSource.render(renderer, 0);
      projectionGradientSource.render(renderer, 0);
      const { mesh: screen } = createScreen(screenGradientSource.texture);

      const floorKeyboardMat = new THREE.MeshStandardMaterial({
        color: 0x1a1a22,
        roughness: 0.88,
        metalness: 0.06,
      });

      const floorMesh = createProjectedFloor(100, 100, floorKeyboardMat);
      floorMesh.receiveShadow = true;

      const keyboard = createKeyboard(floorKeyboardMat);
      keyboard.traverse((obj) => {
        if (obj instanceof THREE.Mesh) {
          obj.receiveShadow = true;
          obj.castShadow = true;
        }
      });

      screen.castShadow = false;
      scene.add(screen, floorMesh, keyboard);

      const spot = new THREE.SpotLight(0xffffff, 220);
      spot.decay = 6;
      spot.distance = 35;
      spot.angle = Math.PI / 3.1;
      spot.penumbra = 0.58;
      spot.map = projectionGradientSource.texture;
      spot.castShadow = true;
      spot.shadow.mapSize.set(2048, 2048);
      spot.shadow.bias = -0.0002;
      spot.shadow.normalBias = 0.02;
      spot.position.set(0, 1.0, 0.52);
      spot.target.position.set(0, 0.02, 1.15);
      scene.add(spot);
      scene.add(spot.target);

      const hemiLight = new THREE.HemisphereLight(0xffffff, 0x060608, 0.04);
      hemiLight.position.set(0, 10, 0);
      scene.add(hemiLight);

      const { composer, bloomPass } = createBloomComposer(renderer, scene, camera);

      const tune = {
        projectionIntensity: 1.64,
        reflectionGain: 1.0,
        blurRadiusPx: 64,
        highlightBoost: 1.65,
        lumaVisibilityThreshold: 0.12,
        invertColor: false,
        halftone: true,
        toneCut: false,
      };

      function syncProjectionFxFromTune() {
        const blend = Math.max(0, tune.projectionIntensity) * Math.max(0, tune.reflectionGain);
        spot.intensity = 220 * blend;
        floorKeyboardMat.envMapIntensity = 0.35 * Math.max(0.1, tune.reflectionGain);
        bloomPass.radius = THREE.MathUtils.clamp(tune.blurRadiusPx / 128, 0, 1);
        bloomPass.strength = 0.22 * Math.max(0.2, tune.highlightBoost);
        bloomPass.threshold = THREE.MathUtils.clamp(tune.lumaVisibilityThreshold, 0, 1);

        projectionGradientSource.setEffects({
          projectionIntensity: tune.projectionIntensity,
          reflectionGain: tune.reflectionGain,
          highlightBoost: tune.highlightBoost,
          lumaVisibilityThreshold: tune.lumaVisibilityThreshold,
          invertColor: tune.invertColor,
          halftone: tune.halftone,
          toneCut: tune.toneCut,
        });
      }

      syncProjectionFxFromTune();

      let rafId = null;
      function animate() {
        rafId = requestAnimationFrame(animate);
        const shouldRenderFirstScreen = !document.body.classList.contains("show-liquid") && !document.body.classList.contains("show-astrodither") && !document.body.classList.contains("vibe-transitioning");
        if (!shouldRenderFirstScreen) return;
        const t = performance.now() * 0.001;
        screenGradientSource.render(renderer, t);
        projectionGradientSource.render(renderer, t);
        syncProjectionFxFromTune();
        composer.render();
      }
      animate();

      function onResize() {
        const { width, height } = getAppSize();
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
        renderer.setSize(width, height);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        composer.setSize(width, height);
      }

      window.addEventListener("resize", onResize);

      window.addEventListener("beforeunload", () => {
        if (rafId !== null) cancelAnimationFrame(rafId);
        screenGradientSource.dispose();
        projectionGradientSource.dispose();
        floorKeyboardMat.dispose();
        floorMesh.geometry.dispose();
        renderer.dispose();
      });
    </script>
  </body>
</html>

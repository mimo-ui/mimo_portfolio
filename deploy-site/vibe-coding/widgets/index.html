<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iPhone Widgets Animation</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0d0d0d;
        -ms-overflow-style: none; /* IE and Edge */
        scrollbar-width: none; /* Firefox */
      }

      body::-webkit-scrollbar {
        display: none; /* Chrome, Safari and Opera */
      }

      section {
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100dvh;
        min-height: 560px;
        width: 100vw;
        overflow: hidden;
      }

      .iphone {
        position: absolute;
        height: min(72vh, 600px);
        will-change: transform;
      }

      .widgets {
        position: absolute;
        z-index: 1;
        scale: 0;
        will-change: transform, opacity;
      }

      .iphone {
        z-index: 2;
      }

      #socials {
        background: linear-gradient(#ff348b, #e30217);
        border-radius: 30px;
        aspect-ratio: 1;
        height: 140px;
        display: flex;
        justify-content: space-evenly;
        align-items: center;
        flex-wrap: wrap;
      }

      a {
        text-decoration: none;
        font-size: 30px;
        font-family: sans-serif;
        background-color: white;
        aspect-ratio: 1;
        height: 50px;
        border-radius: 100%;
        color: black;
        display: flex;
        justify-content: center;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <section class="animation">
      <img class="iphone" src="https://assets.codepen.io/8292695/iphone-14.svg" alt="" />
      <img id="app-store" class="widgets" src="https://assets.codepen.io/8292695/appstore-widget.svg" alt="" />
      <img id="screen-time" class="widgets" src="https://assets.codepen.io/8292695/screen-time-widget.svg" alt="" />
      <img id="weather" class="widgets" src="https://assets.codepen.io/8292695/weather-widget.svg" alt="" />
      <img id="stocks" class="widgets" src="https://assets.codepen.io/8292695/stocks-widget.svg" alt="" />
      <img id="calendar" class="widgets" src="https://assets.codepen.io/8292695/calendar-widget.svg" alt="" />
      <img id="fitness" class="widgets" src="https://assets.codepen.io/8292695/fitness-widget.svg" alt="" />
      <img id="find-my" class="widgets" src="https://assets.codepen.io/8292695/find-my-widget.svg" alt="" />
      <img id="sleep" class="widgets" src="https://assets.codepen.io/8292695/sleep-widget.svg" alt="" />
      <img id="apple-tv" class="widgets" src="https://assets.codepen.io/8292695/apple-tv.svg" alt="" />
      <img id="wallet" class="widgets" src="https://assets.codepen.io/8292695/wallet.svg" alt="" />
      <div id="socials" class="widgets">
        <a href="https://twitter.com/GibsonSMurray" target="_blank" title="𝕏 account">
          <span>𝕏</span>
        </a>
        <a href="https://haptic.app/" target="_blank" title="inspiration">
          <span>✰</span>
        </a>
      </div>
    </section>

    <script src="vendor/gsap.min.js"></script>
    <script>

      const iphone = document.querySelector(".iphone");
      const widgets = document.querySelectorAll(".widgets");
      let isActive = window.parent === window;
      let wheelLocked = false;

      gsap.set(iphone, { x: -450, rotation: 90 });
      gsap.set(widgets, { opacity: 0, scale: 0 });

      function iPhoneAnimation() {
        const tl = gsap.timeline({ defaults: { duration: 1 } });
        tl.to(iphone, { x: 0 })
          .to(iphone, { rotation: 0, scale: 0.9 })
          .to(iphone, { duration: 3, scale: 1 });
        return tl;
      }

      function widgetAnimation() {
        const tl = gsap.timeline();
        tl.to(widgets, { duration: 0, opacity: 1 });
        return tl;
      }

      const animations = [
        {
          selector: "#app-store",
          duration: 3,
          scale: 0.9,
          x: 500,
          y: 100,
          ease: Power4.easeOut
        },
        {
          selector: "#screen-time",
          duration: 3,
          scale: 0.9,
          x: -500,
          y: -300,
          ease: Power2.easeOut
        },
        {
          selector: "#weather",
          duration: 3,
          scale: 1.1,
          x: -400,
          y: 350,
          ease: Power4.easeOut
        },
        {
          selector: "#stocks",
          duration: 3,
          scale: 0.9,
          x: 530,
          y: -170,
          ease: Power4.easeOut
        },
        {
          selector: "#fitness",
          duration: 3,
          scale: 1.1,
          x: -350,
          y: -100,
          ease: Power2.easeOut
        },
        {
          selector: "#find-my",
          duration: 3,
          scale: 1.1,
          x: 400,
          y: -360,
          ease: Power4.easeOut
        },
        {
          selector: "#calendar",
          duration: 3,
          scale: 0.9,
          x: -630,
          y: 0,
          ease: Power2.easeOut
        },

        {
          selector: "#wallet",
          duration: 3,
          scale: 1,
          x: -280,
          y: 100,
          ease: Power4.easeOut
        },
        {
          selector: "#apple-tv",
          duration: 3,
          scale: 1,
          x: 500,
          y: 300,
          ease: Power4.easeOut
        },
        {
          selector: "#sleep",
          duration: 3,
          scale: 0.9,
          x: 270,
          y: -50,
          ease: Power2.easeOut
        },
        {
          selector: "#socials",
          duration: 3,
          scale: 1,
          x: 330,
          y: 120,
          ease: Power2.easeOut
        }
      ];
      const startTime = 2;
      const masterTimeline = gsap.timeline({ paused: true });
      window.masterTimeline = masterTimeline;
      masterTimeline.add(iPhoneAnimation()).add(widgetAnimation(), startTime);

      animations.forEach((animation, index) => {
        const { selector, duration, scale, x, y, ease } = animation;
        const element = document.querySelector(selector);
        masterTimeline.add(
          gsap.to(element, { duration, scale, x, y, ease }),
          startTime + (index % 3) / 2
        );
      });

      function setActive(active) {
        isActive = active;
        if (isActive) {
          masterTimeline.progress(0).pause();
          return;
        }
        masterTimeline.pause();
      }

      function notifyParentStep(direction) {
        if (window.parent === window) return;
        window.parent.postMessage({ type: "vibe-screen-step", source: "widgets", direction }, "*");
      }

      function scrubTimeline(deltaY) {
        const current = masterTimeline.progress();
        const next = Math.min(1, Math.max(0, current + deltaY / 4200));
        masterTimeline.progress(next).pause();
        return next;
      }

      window.addEventListener("message", (event) => {
        if (!event.data || event.data.type !== "vibe-frame-active") return;
        setActive(Boolean(event.data.active));
      });

      window.addEventListener("wheel", (event) => {
        if (Math.abs(event.deltaY) < 8 || wheelLocked) return;
        event.preventDefault();
        if (event.deltaY < 0 && masterTimeline.progress() <= 0.01) {
          wheelLocked = true;
          notifyParentStep(-1);
          window.setTimeout(() => { wheelLocked = false; }, 760);
          return;
        }
        scrubTimeline(event.deltaY);
      }, { passive: false });

      let touchStartY = 0;
      window.addEventListener("touchstart", (event) => {
        touchStartY = event.touches[0] ? event.touches[0].clientY : 0;
      }, { passive: true });
      window.addEventListener("touchmove", (event) => {
        const currentY = event.touches[0] ? event.touches[0].clientY : touchStartY;
        const delta = touchStartY - currentY;
        if (Math.abs(delta) < 24 || wheelLocked) return;
        event.preventDefault();
        if (delta < 0 && masterTimeline.progress() <= 0.01) {
          wheelLocked = true;
          notifyParentStep(-1);
          window.setTimeout(() => { wheelLocked = false; }, 760);
          return;
        }
        scrubTimeline(delta * 2.4);
      }, { passive: false });

      if (isActive) {
        masterTimeline.progress(0).pause();
      }
    </script>
  </body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CoinW Input / Button Components</title>
  <style>
    :root {
      --text-primary: rgba(255,255,255,.92);
      --text-tertiary: rgba(255,255,255,.46);
      --text-quarternary: rgba(255,255,255,.24);
      --bg-page: #000000;
      --bg-surface: #151419;
      --bg-preview: #0f1013;
      --bg-input: rgba(255,255,255,.075);
      --border-subtle: rgba(255,255,255,.105);
      --brand-default: #5227ff;
      --brand-hover: #6c4fff;
      --brand-press: #2509b3;
      --brand-disable: rgba(255,255,255,.075);
      --secondary-default: rgba(82, 39, 255, .10);
      --tertiary-default: rgba(255, 255, 255, .08);
      --green-default: #14a739;
      --red-default: #e95032;
      --black-default: #1a1a1a;
      --font: Satoshi, Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      --motion: cubic-bezier(.16, 1, .3, 1);
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      overflow-x: hidden;
      color: var(--text-primary);
      background: var(--bg-page);
      font-family: var(--font);
    }

    button { font: inherit; }

    .page {
      width: min(1120px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 32px 0 56px;
    }

    .title {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-subtle);
    }

    h1,
    h2,
    p { margin: 0; }

    h1 {
      font-size: 32px;
      line-height: 40px;
      letter-spacing: 0;
      font-weight: 700;
    }

    .source {
      max-width: 420px;
      color: var(--text-tertiary);
      font-size: 12px;
      line-height: 16px;
      text-align: right;
      overflow-wrap: anywhere;
    }

    .board {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding-top: 24px;
      min-width: 0;
    }

    .component-block {
      min-width: 0;
      width: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 16px;
      padding: 20px;
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      background: var(--bg-surface);
      overflow: hidden;
    }

    .block-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h2 {
      font-size: 18px;
      line-height: 24px;
      font-weight: 700;
    }

    .variant-label {
      color: var(--text-tertiary);
      font-size: 12px;
      line-height: 16px;
      font-weight: 500;
      text-align: right;
    }

    .preview {
      min-height: 280px;
      display: grid;
      place-items: center;
      padding: 36px 20px;
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      background: var(--bg-preview);
    }

    .controls {
      display: grid;
      gap: 12px;
      min-width: 0;
    }

    .control-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-width: 0;
    }

    .control-row strong {
      flex: 0 0 72px;
      color: var(--text-tertiary);
      font-size: 12px;
      line-height: 32px;
      font-weight: 500;
    }

    .chip {
      min-width: 44px;
      height: 32px;
      padding: 0 12px;
      border: 1px solid var(--border-subtle);
      border-radius: 4px;
      background: rgba(255,255,255,.045);
      color: var(--text-tertiary);
      cursor: pointer;
      font-size: 12px;
      line-height: 16px;
      font-weight: 700;
      letter-spacing: 0;
      transition: background 160ms var(--motion), color 160ms var(--motion), border-color 160ms var(--motion), transform 160ms var(--motion);
    }

    .chip:hover {
      border-color: var(--brand-default);
      color: var(--brand-default);
      transform: translateY(-1px);
    }

    .chip[aria-pressed="true"] {
      border-color: var(--brand-default);
      background: var(--brand-default);
      color: #fff;
    }

    .chip:disabled {
      border-color: var(--border-subtle);
      background: rgba(255,255,255,.045);
      color: var(--text-quarternary);
      cursor: not-allowed;
      opacity: .58;
      transform: none;
    }

    .chip:disabled:hover {
      border-color: var(--border-subtle);
      color: var(--text-quarternary);
      transform: none;
    }

    .control-row.is-disabled strong {
      color: var(--text-quarternary);
    }

    .cw-button {
      --btn-bg: var(--brand-default);
      --btn-color: #fff;
      --btn-size: 40px;
      --btn-radius: 8px;
      --btn-pad: 10px;
      --btn-font: 14px;
      --btn-line: 20px;
      min-width: var(--btn-width);
      height: var(--btn-size);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: var(--btn-pad);
      border: 0;
      border-radius: var(--btn-radius);
      background: var(--btn-bg);
      color: var(--btn-color);
      cursor: pointer;
      font-size: var(--btn-font);
      line-height: var(--btn-line);
      font-weight: 700;
      letter-spacing: .1px;
      transition: background 160ms var(--motion), color 160ms var(--motion), transform 160ms var(--motion), opacity 160ms var(--motion);
    }

    .cw-button .text-container {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
      white-space: nowrap;
    }

    .cw-button .icon {
      width: 20px;
      height: 20px;
      position: relative;
      flex: 0 0 20px;
      color: currentColor;
    }

    .cw-button .icon::before,
    .cw-button .icon::after {
      content: "";
      position: absolute;
      left: 5px;
      top: 9px;
      width: 10px;
      height: 2px;
      border-radius: 999px;
      background: currentColor;
    }

    .cw-button .icon::after {
      left: 4px;
      top: 6px;
      width: 7px;
      height: 7px;
      border-left: 2px solid currentColor;
      border-bottom: 2px solid currentColor;
      border-radius: 1px;
      background: transparent;
      transform: rotate(45deg);
    }

    .cw-button.theme-link {
      min-width: auto;
      height: var(--btn-line);
      padding: 0;
      border-radius: 0;
      background: transparent;
    }

    .cw-button.theme-circle {
      width: 56px;
      min-width: 56px;
      height: 56px;
      padding: 18px;
      border-radius: 50%;
    }

    .cw-button.theme-circle .text-container,
    .cw-button.theme-circle .icon.trailing { display: none; }

    .input-shell {
      width: 280px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
    }

    .cw-label {
      display: flex;
      align-items: center;
      gap: 4px;
      width: 100%;
      color: var(--text-primary);
      font-size: 14px;
      line-height: 20px;
      font-weight: 500;
      letter-spacing: .1px;
    }

    .cw-input {
      --input-h: 40px;
      --input-radius: 8px;
      --input-py: 10px;
      width: 100%;
      height: var(--input-h);
      display: flex;
      align-items: center;
      overflow: hidden;
      border: 0;
      border-radius: var(--input-radius);
      background: var(--bg-input);
      color: var(--text-primary);
      transition: border-color 160ms var(--motion), transform 160ms var(--motion);
    }

    .cw-input.state-hover,
    .cw-input.state-focus { border: 1px solid var(--brand-default); }

    .cw-input.state-error { border: 1px solid var(--red-default); }

    .cw-input.state-focus { transform: translateY(-1px); }

    .leading-slot,
    .trailing-slot {
      height: 100%;
      display: inline-flex;
      align-items: center;
      flex: 0 0 auto;
      color: var(--text-tertiary);
      font-size: 14px;
      line-height: 20px;
      font-weight: 500;
      letter-spacing: .1px;
    }

    .leading-slot { padding-left: 12px; }
    .trailing-slot { padding-right: 12px; text-align: right; }

    .leading-slot[hidden],
    .trailing-slot[hidden] { display: none; }

    .coin-icon {
      width: 20px;
      height: 20px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #f2b84b;
      color: #fff;
      font-size: 11px;
      line-height: 1;
      font-weight: 700;
    }

    .input-content {
      flex: 1 0 0;
      min-width: 0;
      height: 100%;
      display: flex;
      align-items: center;
      overflow: hidden;
      padding: var(--input-py) 12px;
      color: var(--text-primary);
      font-size: 14px;
      line-height: 20px;
      font-weight: 500;
      letter-spacing: .1px;
      white-space: nowrap;
    }

    .placeholder {
      min-width: 0;
      overflow: hidden;
      color: var(--text-tertiary);
      text-overflow: ellipsis;
    }

    .value {
      min-width: 0;
      overflow: hidden;
      color: var(--text-primary);
      text-overflow: ellipsis;
    }

    .state-disabled .placeholder,
    .state-disabled .value { color: var(--text-quarternary); }

    .cursor {
      width: 2px;
      height: 20px;
      margin-right: 0;
      flex: 0 0 2px;
      background: var(--brand-default);
      animation: blink 1s steps(2, start) infinite;
    }

    .clear {
      width: 20px;
      height: 20px;
      margin-left: auto;
      display: grid;
      place-items: center;
      flex: 0 0 20px;
      border: 0;
      background: transparent;
      color: var(--text-tertiary);
      cursor: pointer;
      font-size: 18px;
      line-height: 20px;
    }

    .support {
      width: 100%;
      color: var(--text-tertiary);
      font-size: 12px;
      line-height: 16px;
      font-weight: 400;
    }

    .support.error { color: var(--red-default); }

    .input-mode-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 4px;
    }

    .trade-input {
      width: 280px;
      height: 48px;
      display: flex;
      align-items: center;
      overflow: hidden;
      border-radius: 12px;
      background: var(--bg-input);
      color: var(--text-primary);
    }

    .trade-input.theme-outlined {
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.045);
    }

    .trade-input.state-hover,
    .trade-input.state-focus {
      border: 1px solid var(--brand-default);
    }

    .trade-input.state-error {
      border: 1px solid var(--red-default);
    }

    .trade-input.state-disabled {
      border-color: rgba(255,255,255,.08);
    }

    .trade-main {
      min-width: 0;
      flex: 1 0 0;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 2px;
      padding: 7px 12px;
      overflow: hidden;
    }

    .trade-label {
      color: var(--text-tertiary);
      font-size: 10px;
      line-height: 12px;
      font-weight: 500;
    }

    .trade-value {
      min-width: 0;
      display: flex;
      align-items: center;
      color: var(--text-primary);
      font-size: 14px;
      line-height: 20px;
      font-weight: 500;
      letter-spacing: .1px;
      white-space: nowrap;
    }

    .trade-input.is-empty .trade-label {
      color: var(--text-tertiary);
      font-size: 14px;
      line-height: 20px;
      letter-spacing: .1px;
    }

    .trade-input.is-empty .trade-value { display: none; }

    .trade-input.state-disabled .trade-label,
    .trade-input.state-disabled .trade-value,
    .trade-input.state-disabled .trailing-slot {
      color: var(--text-quarternary);
    }

    .verify-shell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .verify-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
    }

    .verify-cell {
      width: 56px;
      height: 56px;
      max-width: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 56px;
      overflow: hidden;
      border: 0;
      border-radius: 16px;
      background: var(--bg-input);
      color: var(--text-primary);
      font-size: 16px;
      line-height: 24px;
      font-weight: 500;
      letter-spacing: .15px;
      text-align: center;
    }

    .verify-shell.state-hover .verify-cell:first-child,
    .verify-shell.state-focus .verify-cell:first-child,
    .verify-shell.state-focus.is-inputted .verify-cell:last-child {
      border: 1px solid var(--brand-default);
    }

    .verify-shell.state-error .verify-cell {
      border: 1px solid var(--red-default);
    }

    .verify-shell.state-disabled .verify-cell {
      color: var(--text-quarternary);
    }

    .verify-support {
      width: 100%;
      max-width: 396px;
      color: var(--text-tertiary);
      font-size: 12px;
      line-height: 16px;
      font-weight: 400;
    }

    .verify-support.error { color: var(--red-default); }

    @keyframes blink {
      50% { opacity: 0; }
    }

    @media (max-width: 880px) {
      .page {
        width: 100%;
        padding: 24px 12px 40px;
      }

      .title {
        align-items: flex-start;
        flex-direction: column;
      }

      .source {
        width: 100%;
        max-width: 320px;
        text-align: left;
      }

      .board { grid-template-columns: 1fr; }
      .component-block { max-width: calc(100vw - 24px); }
      .preview { min-height: 220px; }

      .block-head {
        align-items: flex-start;
        flex-direction: column;
        gap: 4px;
      }

      .variant-label { text-align: left; }

      .control-row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
        width: 100%;
        overflow: hidden;
      }

      .control-row strong {
        grid-column: 1 / -1;
        flex-basis: auto;
        line-height: 16px;
      }

      .chip {
        min-width: 0;
        width: 100%;
      }

      .verify-row {
        gap: 8px;
      }

      .verify-cell {
        width: 44px;
        height: 44px;
        flex-basis: 44px;
        border-radius: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="title">
      <h1>Input / Button</h1>
      <p class="source">Interactive component states based on the Figma Input and Button components.</p>
    </header>

    <section class="board" aria-label="CoinW input and button components">
      <article class="component-block">
        <div class="block-head">
          <h2>Button</h2>
          <div class="variant-label" id="buttonVariant">Solid / M / Primary / Default</div>
        </div>

        <div class="preview">
          <button class="cw-button" id="buttonPreview" type="button" data-node-id="3:2175">
            <span class="icon leading" aria-hidden="true"></span>
            <span class="text-container">Button</span>
            <span class="icon trailing" aria-hidden="true" hidden></span>
          </button>
        </div>

        <div class="controls">
          <div class="control-row" data-group="buttonTheme">
            <strong>Theme</strong>
            <button class="chip" type="button" data-value="solid" aria-pressed="true">Solid</button>
            <button class="chip" type="button" data-value="borderless" aria-pressed="false">Borderless</button>
            <button class="chip" type="button" data-value="link" aria-pressed="false">Link</button>
            <button class="chip" type="button" data-value="circle" aria-pressed="false">Circle</button>
          </div>
          <div class="control-row" data-group="buttonSize">
            <strong>Size</strong>
            <button class="chip" type="button" data-value="XS" aria-pressed="false">XS</button>
            <button class="chip" type="button" data-value="S" aria-pressed="false">S</button>
            <button class="chip" type="button" data-value="M" aria-pressed="true">M</button>
            <button class="chip" type="button" data-value="L" aria-pressed="false">L</button>
            <button class="chip" type="button" data-value="XL" aria-pressed="false">XL</button>
          </div>
          <div class="control-row" data-group="buttonType">
            <strong>Type</strong>
            <button class="chip" type="button" data-value="primary" aria-pressed="true">Primary</button>
            <button class="chip" type="button" data-value="secondary" aria-pressed="false">Secondary</button>
            <button class="chip" type="button" data-value="tertiary" aria-pressed="false">Tertiary</button>
            <button class="chip" type="button" data-value="black" aria-pressed="false">Black</button>
            <button class="chip" type="button" data-value="green" aria-pressed="false">Green</button>
            <button class="chip" type="button" data-value="red" aria-pressed="false">Red</button>
          </div>
          <div class="control-row" data-group="buttonState">
            <strong>State</strong>
            <button class="chip" type="button" data-value="default" aria-pressed="true">Default</button>
            <button class="chip" type="button" data-value="hover" aria-pressed="false">Hover</button>
            <button class="chip" type="button" data-value="pressed" aria-pressed="false">Pressed</button>
            <button class="chip" type="button" data-value="disabled" aria-pressed="false">Disabled</button>
          </div>
        </div>
      </article>

      <article class="component-block">
        <div class="block-head">
          <h2>Input</h2>
          <div class="variant-label" id="inputVariant">M / Inputted Off / Default</div>
        </div>

        <div class="preview" id="inputMount">
        </div>

        <div class="controls">
          <div class="control-row" data-group="inputMode">
            <strong>Mode</strong>
            <button class="chip" type="button" data-value="base" aria-pressed="true">Input</button>
            <button class="chip" type="button" data-value="trade" aria-pressed="false">For Trade</button>
            <button class="chip" type="button" data-value="verify" aria-pressed="false">For Verify</button>
          </div>
          <div class="control-row" data-group="inputTheme">
            <strong>Theme</strong>
            <button class="chip" type="button" data-value="filled" aria-pressed="true">Filled</button>
            <button class="chip" type="button" data-value="outlined" aria-pressed="false">Outlined</button>
          </div>
          <div class="control-row" data-group="inputSize">
            <strong>Size</strong>
            <button class="chip" type="button" data-value="M" aria-pressed="true">M</button>
            <button class="chip" type="button" data-value="L" aria-pressed="false">L</button>
          </div>
          <div class="control-row" data-group="inputted">
            <strong>Value</strong>
            <button class="chip" type="button" data-value="off" aria-pressed="true">Off</button>
            <button class="chip" type="button" data-value="on" aria-pressed="false">On</button>
          </div>
          <div class="control-row" data-group="inputState">
            <strong>State</strong>
            <button class="chip" type="button" data-value="default" aria-pressed="true">Default</button>
            <button class="chip" type="button" data-value="hover" aria-pressed="false">Hover</button>
            <button class="chip" type="button" data-value="focus" aria-pressed="false">Focus</button>
            <button class="chip" type="button" data-value="disabled" aria-pressed="false">Disabled</button>
            <button class="chip" type="button" data-value="error" aria-pressed="false">Error</button>
          </div>
          <div class="control-row" data-group="inputParts">
            <strong>Slot</strong>
            <button class="chip" type="button" data-value="leading" aria-pressed="false">Leading</button>
            <button class="chip" type="button" data-value="trailing" aria-pressed="false">Trailing</button>
            <button class="chip" type="button" data-value="clear" aria-pressed="true">Clear</button>
          </div>
        </div>
      </article>
    </section>
  </main>

  <script>
    const state = {
      buttonTheme: "solid",
      buttonSize: "M",
      buttonType: "primary",
      buttonState: "default",
      inputMode: "base",
      inputTheme: "filled",
      inputSize: "M",
      inputted: "off",
      inputState: "default",
      leading: false,
      trailing: false,
      clear: true
    };

    const params = new URLSearchParams(window.location.search);
    if (["base", "trade", "verify"].includes(params.get("mode"))) {
      state.inputMode = params.get("mode");
    }

    const buttonSizes = {
      XS: { width: 66, height: 24, radius: 4, pad: 2, font: 12, line: 16 },
      S: { width: 85, height: 32, radius: 6, pad: 6, font: 14, line: 20 },
      M: { width: 97, height: 40, radius: 8, pad: 10, font: 14, line: 20 },
      L: { width: 105, height: 48, radius: 12, pad: 14, font: 14, line: 20 },
      XL: { width: 118, height: 56, radius: 12, pad: 18, font: 16, line: 24 }
    };

    const inputSizes = {
      M: { height: 40, radius: 8, py: 10 },
      L: { height: 48, radius: 12, py: 14 }
    };

    const solidColors = {
      primary: { default: "#5227ff", hover: "#6c4fff", pressed: "#2509b3", text: "#ffffff" },
      secondary: { default: "rgba(82,39,255,.10)", hover: "rgba(82,39,255,.16)", pressed: "rgba(82,39,255,.24)", text: "#5227ff" },
      tertiary: { default: "rgba(255,255,255,.08)", hover: "rgba(255,255,255,.13)", pressed: "rgba(255,255,255,.18)", text: "rgba(255,255,255,.88)" },
      black: { default: "#1a1a1a", hover: "#333333", pressed: "#000000", text: "#ffffff" },
      green: { default: "#14a739", hover: "#27bd4e", pressed: "#087a28", text: "#ffffff" },
      red: { default: "#e95032", hover: "#f36b51", pressed: "#b72d16", text: "#ffffff" }
    };

    document.querySelectorAll(".control-row").forEach((row) => {
      row.addEventListener("click", (event) => {
        const chip = event.target.closest(".chip");
        if (!chip) return;
        if (chip.disabled) return;
        const group = row.dataset.group;
        const value = chip.dataset.value;

        if (group === "inputParts") {
          state[value] = !state[value];
          chip.setAttribute("aria-pressed", String(state[value]));
        } else {
          state[group] = value;
          row.querySelectorAll(".chip").forEach((item) => {
            item.setAttribute("aria-pressed", String(item === chip));
          });
        }

        render();
      });
    });

    function setChoice(group, value) {
      state[group] = value;
      document.querySelectorAll(`[data-group="${group}"] .chip`).forEach((chip) => {
        chip.setAttribute("aria-pressed", String(chip.dataset.value === value));
      });
      render();
    }

    function renderButton() {
      normalizeButtonState();
      const button = document.querySelector("#buttonPreview");
      const trailing = button.querySelector(".trailing");
      const text = button.querySelector(".text-container");
      const size = buttonSizes[state.buttonTheme === "circle" ? "XL" : state.buttonSize];
      const colors = solidColors[state.buttonType] || solidColors.primary;
      let bg = colors[state.buttonState] || colors.default;
      let color = colors.text;

      button.className = `cw-button theme-${state.buttonTheme}`;
      button.style.setProperty("--btn-width", state.buttonTheme === "link" ? "auto" : `${size.width}px`);
      button.style.setProperty("--btn-size", `${size.height}px`);
      button.style.setProperty("--btn-radius", `${size.radius}px`);
      button.style.setProperty("--btn-pad", `${size.pad}px`);
      button.style.setProperty("--btn-font", `${size.font}px`);
      button.style.setProperty("--btn-line", `${size.line}px`);

      if (state.buttonTheme === "borderless" || state.buttonTheme === "link") {
        bg = state.buttonState === "hover" ? "rgba(82,39,255,.08)" : state.buttonState === "pressed" ? "rgba(82,39,255,.12)" : "transparent";
        color = colors.text === "#ffffff" ? colors.default : colors.text;
      }

      if (state.buttonState === "disabled") {
        bg = state.buttonTheme === "link" ? "transparent" : "rgba(255,255,255,.075)";
        color = "#bfbfbf";
      }

      button.style.setProperty("--btn-bg", bg);
      button.style.setProperty("--btn-color", color);
      button.disabled = state.buttonState === "disabled";
      trailing.hidden = true;
      text.textContent = state.buttonTheme === "link" ? "Button Link" : "Button";
      document.querySelector("#buttonVariant").textContent = `${label(state.buttonTheme)} / ${state.buttonTheme === "circle" ? "XL" : state.buttonSize} / ${label(state.buttonType)} / ${label(state.buttonState)}`;
    }

    function renderInput() {
      normalizeInputState();
      updateControlAvailability();
      if (state.inputMode === "trade") {
        renderTradeInput();
        return;
      }
      if (state.inputMode === "verify") {
        renderVerifyInput();
        return;
      }
      renderBaseInput();
    }

    function renderBaseInput() {
      const mount = document.querySelector("#inputMount");
      const size = inputSizes[state.inputSize];
      const inputted = state.inputted === "on";
      mount.innerHTML = `
        <div class="input-shell" id="inputShell" data-node-id="3:1037">
          <div class="cw-label">Label</div>
          <div class="cw-input state-${state.inputState}" id="inputPreview">
            <div class="leading-slot" id="leadingSlot" ${state.leading ? "" : "hidden"}><span class="coin-icon">B</span></div>
            <div class="input-content" id="inputContent"></div>
            <div class="trailing-slot" id="trailingSlot" ${state.trailing ? "" : "hidden"}>USDT</div>
          </div>
          <div class="support" id="supportText">Help Text</div>
        </div>
      `;

      const input = document.querySelector("#inputPreview");
      const content = document.querySelector("#inputContent");
      const support = document.querySelector("#supportText");
      input.className = `cw-input state-${state.inputState}`;
      input.style.setProperty("--input-h", `${size.height}px`);
      input.style.setProperty("--input-radius", `${size.radius}px`);
      input.style.setProperty("--input-py", `${size.py}px`);

      if (state.inputState === "focus" && !inputted) {
        content.innerHTML = '<span class="cursor"></span><span class="placeholder">Placeholder</span>';
      } else if (state.inputState === "focus" && inputted) {
        content.innerHTML = '<span class="value">Content</span><span class="cursor"></span>' + clearMarkup();
      } else if (inputted) {
        content.innerHTML = '<span class="value">Content</span>' + clearMarkup();
      } else {
        content.innerHTML = '<span class="placeholder">Placeholder</span>';
      }

      support.textContent = state.inputState === "error" ? "Error Text" : "Help Text";
      support.classList.toggle("error", state.inputState === "error");
      document.querySelector("#inputVariant").textContent = `Input / ${state.inputSize} / Inputted ${inputted ? "On" : "Off"} / ${label(state.inputState)}`;
    }

    function renderTradeInput() {
      const mount = document.querySelector("#inputMount");
      const inputted = state.inputted === "on";
      const isEmpty = !inputted && state.inputState !== "focus";
      const showError = state.inputState === "error";
      const shellClass = `trade-input theme-${state.inputTheme} state-${state.inputState} ${isEmpty ? "is-empty" : ""}`;
      mount.innerHTML = `
        <div class="input-shell" data-node-id="3:1254">
          <div class="${shellClass}" id="inputPreview">
            <div class="trade-main">
              <div class="trade-label">Label</div>
              <div class="trade-value" id="inputContent"></div>
            </div>
            <div class="trailing-slot">USDT</div>
          </div>
          ${showError ? '<div class="support error">Error Text</div>' : ""}
        </div>
      `;

      const content = document.querySelector("#inputContent");
      if (state.inputState === "focus" && !inputted) {
        content.innerHTML = '<span class="cursor"></span>';
      } else if (state.inputState === "focus" && inputted) {
        content.innerHTML = '<span class="value">Content</span><span class="cursor"></span>';
      } else {
        content.innerHTML = inputted ? '<span class="value">Content</span>' : "";
      }

      document.querySelector("#inputVariant").textContent = `Input For Trade / ${label(state.inputTheme)} / Inputted ${inputted ? "On" : "Off"} / ${label(state.inputState)}`;
    }

    function renderVerifyInput() {
      const mount = document.querySelector("#inputMount");
      const inputted = state.inputted === "on";
      const values = inputted ? ["1", "1", "1", "1", "1", state.inputState === "focus" ? "1|" : "1"] : ["", "", "", "", "", ""];
      const support = state.inputState === "error" ? "Error Text" : "Help Text";
      const showSupport = state.inputState === "error" || inputted;
      mount.innerHTML = `
        <div class="verify-shell state-${state.inputState} ${inputted ? "is-inputted" : ""}" id="inputPreview" data-node-id="3:1381">
          <div class="verify-row">
            ${values.map((value, index) => `
              <div class="verify-cell">
                ${value === "1|" ? '<span>1</span><span class="cursor"></span>' : value}
              </div>
            `).join("")}
          </div>
          ${showSupport ? `<div class="verify-support ${state.inputState === "error" ? "error" : ""}">${support}</div>` : ""}
        </div>
      `;
      document.querySelector("#inputVariant").textContent = `Input For Verify / Inputted ${inputted ? "On" : "Off"} / ${label(state.inputState)}`;
    }

    function clearMarkup() {
      return state.clear ? '<button class="clear" type="button" aria-label="Clear input">×</button>' : "";
    }

    function label(value) {
      return value.charAt(0).toUpperCase() + value.slice(1);
    }

    function render() {
      renderButton();
      renderInput();
    }

    function normalizeButtonState() {
      if (state.buttonTheme === "circle") {
        state.buttonSize = "XL";
        if (!["primary", "tertiary"].includes(state.buttonType)) {
          state.buttonType = "primary";
        }
        syncControl("buttonSize", state.buttonSize);
        syncControl("buttonType", state.buttonType);
      }
    }

    function normalizeInputState() {
      if (state.inputMode === "trade") {
        state.inputSize = "L";
        state.leading = false;
        state.clear = false;
        syncControl("inputTheme", state.inputTheme);
        syncControl("inputSize", state.inputSize);
        syncInputPartControls();
      }

      if (state.inputMode === "verify") {
        state.inputTheme = "filled";
        state.inputSize = "L";
        state.leading = false;
        state.trailing = false;
        state.clear = false;
        syncControl("inputTheme", state.inputTheme);
        syncControl("inputSize", state.inputSize);
        syncInputPartControls();
      }
    }

    function updateControlAvailability() {
      setDisabled("buttonSize", (value) => state.buttonTheme === "circle" && value !== "XL");
      setDisabled("buttonType", (value) => state.buttonTheme === "circle" && !["primary", "tertiary"].includes(value));

      setDisabled("inputTheme", () => state.inputMode !== "trade");
      setDisabled("inputSize", () => state.inputMode !== "base");
      setDisabled("inputParts", () => state.inputMode !== "base");
    }

    function setDisabled(group, shouldDisable) {
      const row = document.querySelector(`[data-group="${group}"]`);
      if (!row) return;
      let allDisabled = true;
      row.querySelectorAll(".chip").forEach((chip) => {
        const disabled = shouldDisable(chip.dataset.value);
        chip.disabled = disabled;
        chip.setAttribute("aria-disabled", String(disabled));
        if (disabled && chip.getAttribute("aria-pressed") === "true") {
          chip.setAttribute("aria-pressed", "false");
        }
        if (!disabled) allDisabled = false;
      });
      row.classList.toggle("is-disabled", allDisabled);
    }

    function syncInputPartControls() {
      document.querySelectorAll('[data-group="inputParts"] .chip').forEach((chip) => {
        chip.setAttribute("aria-pressed", String(Boolean(state[chip.dataset.value])));
      });
    }

    function syncControl(group, value) {
      document.querySelectorAll(`[data-group="${group}"] .chip`).forEach((chip) => {
        chip.setAttribute("aria-pressed", String(chip.dataset.value === value));
      });
    }

    const buttonPreview = document.querySelector("#buttonPreview");
    buttonPreview.addEventListener("mouseenter", () => {
      if (state.buttonState !== "disabled") setChoice("buttonState", "hover");
    });
    buttonPreview.addEventListener("mousedown", () => {
      if (state.buttonState !== "disabled") setChoice("buttonState", "pressed");
    });
    buttonPreview.addEventListener("mouseup", () => {
      if (state.buttonState !== "disabled") setChoice("buttonState", "hover");
    });
    buttonPreview.addEventListener("mouseleave", () => {
      if (state.buttonState !== "disabled") setChoice("buttonState", "default");
    });

    document.querySelector("#inputMount").addEventListener("click", () => {
      if (state.inputState === "disabled") return;
      state.inputted = "on";
      document.querySelectorAll('[data-group="inputted"] .chip').forEach((chip) => {
        chip.setAttribute("aria-pressed", String(chip.dataset.value === "on"));
      });
      setChoice("inputState", "focus");
    });

    document.querySelector("#inputMount").addEventListener("click", (event) => {
      if (!event.target.closest(".clear")) return;
      event.stopPropagation();
      state.inputted = "off";
      document.querySelectorAll('[data-group="inputted"] .chip').forEach((chip) => {
        chip.setAttribute("aria-pressed", String(chip.dataset.value === "off"));
      });
      render();
    });

    syncControl("inputMode", state.inputMode);
    render();
  </script>
</body>
</html>

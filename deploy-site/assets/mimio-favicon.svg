<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Mimio favicon</title>
  <desc id="desc">A rounded neon green letter M mark for Mimio on black.</desc>
  <defs>
    <clipPath id="round-corners">
      <rect width="512" height="512" rx="104"/>
    </clipPath>
    <linearGradient id="lime" x1="126" y1="116" x2="386" y2="396" gradientUnits="userSpaceOnUse">
      <stop stop-color="#20ffad"/>
      <stop offset=".55" stop-color="#12f783"/>
      <stop offset="1" stop-color="#15d85d"/>
    </linearGradient>
    <filter id="glow" x="-28%" y="-28%" width="156%" height="156%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#12f686" flood-opacity=".32"/>
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity=".44"/>
    </filter>
  </defs>

  <g clip-path="url(#round-corners)">
    <rect width="512" height="512" fill="#020403"/>
    <circle cx="256" cy="256" r="198" fill="#07110d" opacity=".76"/>

    <g filter="url(#glow)">
      <path d="M132 342V184c0-30 37-44 57-21l67 78 67-78c20-23 57-9 57 21v158"
            fill="none" stroke="url(#lime)" stroke-width="76" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M132 342V184c0-30 37-44 57-21l67 78 67-78c20-23 57-9 57 21v158"
            fill="none" stroke="#b9ffd8" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" opacity=".18"/>
      <path d="M162 166c13-15 34-16 48-2l46 54 46-54c10-11 24-15 37-11"
            fill="none" stroke="#d7ffe9" stroke-width="18" stroke-linecap="round" opacity=".24"/>
    </g>
  </g>
</svg>

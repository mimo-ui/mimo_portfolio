<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CreativeCue 预约模块</title>
  <style>
    :root{color-scheme:dark;--bg:#090909;--panel:#171717;--panel-2:#101010;--line:#303030;--muted:#a8a8a8;--text:#ededed;--tile:#484848;--tile-hover:#5a5a5a;--radius:16px;--focus:#fff}
    *{box-sizing:border-box}
    body{margin:0;min-height:100dvh;display:grid;place-items:center;padding:24px;background:var(--bg);color:var(--text);font-family:Arial,"Helvetica Neue",sans-serif;-webkit-font-smoothing:antialiased}
    button{font:inherit;color:inherit}
    .booking-shell{width:min(1660px,100%);height:min(850px,calc(100dvh - 48px));min-height:680px;display:grid;grid-template-columns:minmax(300px,25%) minmax(580px,50%) minmax(300px,25%);overflow:hidden;border:1px solid var(--line);border-radius:var(--radius);background:var(--panel);box-shadow:0 32px 100px rgba(0,0,0,.48)}
    .info-panel,.calendar-panel,.times-panel{min-width:0}
    .info-panel{display:flex;flex-direction:column;border-right:1px solid var(--line)}
    .collage{height:122px;position:relative;overflow:hidden;background:#ddd}
    .shape{position:absolute;inset:auto;transform:rotate(-8deg)}
    .shape.a{width:52%;height:60%;left:-8%;top:-10%;background:#c61d22;border:18px solid #eee}
    .shape.b{width:34%;height:72%;left:38%;top:18%;background:linear-gradient(135deg,#dfd0bd 0 34%,#ae7744 35% 62%,#6b3e20 63%);box-shadow:22px 16px 0 rgba(240,232,217,.92)}
    .shape.c{width:34%;height:90%;right:-4%;top:-10%;background:linear-gradient(155deg,#111 0 24%,#eee 25% 32%,#111 33% 67%,#c41c24 68%)}
    .spark{position:absolute;left:35px;bottom:-22px;width:50px;height:50px;display:grid;place-items:center;border-radius:50%;background:#f1f1f1;color:#111;font-size:30px;box-shadow:0 8px 24px rgba(0,0,0,.35)}
    .info-content{padding:42px 42px 36px;display:flex;flex:1;flex-direction:column}
    .eyebrow{margin:0 0 26px;color:#999;font-size:17px;font-weight:700;letter-spacing:.02em}
    h1{margin:0 0 18px;font-size:32px;line-height:1.05;letter-spacing:-.03em}
    .description{margin:0;max-width:27ch;color:#c7c7c7;font-size:20px;line-height:1.45}
    .description+p{margin-top:34px}
    .meta{margin-top:auto;display:grid;gap:26px;color:#ccc;font-size:18px}
    .contact-button{display:inline-flex;align-items:center;justify-content:center;align-self:flex-start;margin:28px 0 24px;padding:13px 20px;border:1px solid #555;border-radius:11px;background:#f2f2f2;color:#111;text-decoration:none;font-weight:700;transition:transform .18s ease,background .18s ease}.contact-button:hover{background:#fff;transform:translateY(-2px)}
    .meta-row{display:flex;align-items:center;gap:14px}
    .timezone-row{gap:4px}.timezone-row .icon{width:auto}.timezone-select{width:auto;min-width:0;border:0;background:transparent;color:#ccc;padding:4px 20px 4px 0;font:inherit;cursor:pointer;outline:none}.timezone-select:focus-visible{outline:2px solid #fff;outline-offset:2px;border-radius:6px}.timezone-select option{background:#171717;color:#eee}
    .icon{width:24px;height:24px;display:grid;place-items:center;font-size:23px;flex:none}
    .meet-icon{width:22px;height:17px;border-radius:3px;background:linear-gradient(90deg,#0f9d58 0 35%,#fbbc04 35% 68%,#4285f4 68%);position:relative}
    .meet-icon:after{content:"";position:absolute;right:-6px;top:3px;border:6px solid transparent;border-right:0;border-left-color:#4285f4}
    .calendar-panel{padding:40px 42px;border-right:1px solid var(--line);display:flex;flex-direction:column}
    .calendar-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:34px}
    .month-title{font-size:24px;font-weight:700;letter-spacing:-.02em}.month-title span{color:#999;font-weight:500}
    .month-nav{display:flex;gap:10px}
    .icon-button{width:44px;height:44px;border:0;border-radius:10px;background:transparent;color:#777;font-size:34px;line-height:1;cursor:pointer}
    .icon-button:hover{color:#fff;background:#252525}
    .weekdays,.calendar-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px}
    .weekdays{margin-bottom:14px;color:#d0d0d0;text-align:center;font-size:18px}
    .weekday{padding:12px 0}
    .calendar-grid{flex:1;grid-template-rows:repeat(6,minmax(56px,1fr))}
    .day,.blank{min-width:0;border:0;border-radius:13px;background:transparent;color:#a9a9a9;font-size:20px}
    .day{position:relative;cursor:default}
    .day.available{background:var(--tile);color:#f2f2f2;font-weight:600;cursor:pointer;transition:background .18s ease,transform .18s ease}
    .day.available:hover{background:var(--tile-hover);transform:translateY(-2px)}
    .day.selected{background:#f4f4f4;color:#111}
    .day.today:after{content:"";position:absolute;bottom:16%;left:50%;width:6px;height:6px;transform:translateX(-50%);border-radius:50%;background:currentColor}
    .times-panel{display:flex;min-height:0;flex-direction:column;padding:30px 34px 26px;background:#171717}
    .times-head{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:20px}
    .selected-date{font-size:21px;font-weight:700;white-space:nowrap}
    .time-list{display:grid;gap:13px;min-height:0;overflow:auto;padding-right:3px;scrollbar-width:thin;scrollbar-color:#555 transparent}
    .time-button{min-height:62px;border:1px solid #525252;border-radius:13px;background:#0e0e0e;color:#cfcfcf;font-size:22px;font-weight:600;cursor:pointer;transition:background .18s ease,color .18s ease,transform .18s ease}
    .time-button:hover{background:#272727;color:#fff;transform:translateX(-2px)}
    .time-button[aria-pressed="true"]{background:#f4f4f4;color:#111;border-color:#f4f4f4}.time-button:disabled{cursor:not-allowed;opacity:.34;text-decoration:line-through}.time-button:disabled:hover{transform:none}
    .empty{padding:32px 16px;border:1px dashed #444;border-radius:13px;color:#888;text-align:center}
    .summary{min-height:42px;margin-top:14px;padding-top:14px;border-top:1px solid var(--line);color:#aaa;font-size:14px;line-height:1.4}
    .chosen-meta{display:none;margin:4px 0 28px;padding:18px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);color:#ddd;font-size:17px;line-height:1.55}
    .chosen-meta strong{display:block;color:#fff}.booking-shell.form-stage .chosen-meta{display:block}
    .form-panel{display:none;grid-column:2/4;min-width:0;overflow:auto;padding:40px 48px 52px;background:var(--panel)}
    .booking-shell.form-stage .calendar-panel,.booking-shell.form-stage .times-panel{display:none}.booking-shell.form-stage .form-panel{display:block}
    .form-head{display:flex;align-items:center;gap:18px;margin-bottom:30px}.back-button{width:42px;height:42px;border:1px solid #484848;border-radius:11px;background:#111;cursor:pointer;font-size:24px}.form-head h2{margin:0;font-size:28px}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:22px 24px}.field{display:grid;gap:9px}.field.full{grid-column:1/-1}.field label,.field legend{font-size:18px;font-weight:650}.field input,.field select,.field textarea{width:100%;border:1px solid #555;border-radius:12px;background:#101010;color:#eee;padding:15px 16px;font:inherit;font-size:18px;outline:none}.field input:focus,.field select:focus,.field textarea:focus{border-color:#ddd;box-shadow:0 0 0 2px rgba(255,255,255,.12)}.field textarea{min-height:130px;resize:vertical}.phone-row{display:grid;grid-template-columns:126px 1fr}.phone-row select{padding-inline:16px 12px;border-radius:12px 0 0 12px}.phone-row input{border-left:0;border-radius:0 12px 12px 0}.optional{color:#969696;font-size:.82em;font-weight:500}.radio-group{margin:0;padding:0;border:0}.radio-options{display:flex;gap:28px}.radio-options label{display:flex;align-items:center;gap:9px;font-weight:500}.radio-options input{width:20px;height:20px;accent-color:#fff}.form-actions{display:flex;justify-content:space-between;align-items:center;gap:20px;margin-top:28px}.legal{max-width:56ch;color:#888;font-size:13px;line-height:1.5}.submit-button{min-width:150px;padding:15px 24px;border:0;border-radius:12px;background:#f3f3f3;color:#111;font-weight:700;cursor:pointer}.form-error{min-height:20px;margin:16px 0 0;color:#ff8e8e}.success-state{display:none;min-height:520px;place-items:center;text-align:center}.success-state.visible{display:grid}.success-state h2{font-size:36px;margin:0 0 12px}.success-state p{color:#aaa;font-size:18px}
    button:focus-visible{outline:2px solid var(--focus);outline-offset:3px}
    @media(max-width:1099px){body{place-items:start center}.booking-shell{height:auto;min-height:0;grid-template-columns:minmax(0,1.45fr) minmax(290px,.75fr)}.info-panel{grid-column:1/-1;border-right:0;border-bottom:1px solid var(--line);display:grid;grid-template-columns:220px 1fr}.collage{height:100%}.info-content{padding:28px 34px}.eyebrow{margin-bottom:12px}.description{display:none}.meta{margin-top:20px;display:flex;flex-wrap:wrap;gap:18px 28px}.calendar-panel{min-height:610px}.times-panel{min-height:610px}.form-panel{grid-column:1/-1}.booking-shell.form-stage .info-panel{display:grid}}
    @media(max-width:719px){body{padding:12px}.booking-shell{display:block;border-radius:14px}.info-panel,.booking-shell.form-stage .info-panel{display:block}.collage{height:92px}.info-content{padding:28px 24px}.description{display:block;font-size:17px}.description+p{display:none}.meta{display:grid;gap:16px}.calendar-panel{min-height:540px;padding:28px 16px;border-right:0;border-bottom:1px solid var(--line)}.calendar-head{margin-bottom:20px;padding:0 5px}.month-title{font-size:21px}.weekdays{gap:4px;font-size:14px}.calendar-grid{gap:5px;grid-template-rows:repeat(6,56px)}.day,.blank{font-size:16px;border-radius:10px}.times-panel{min-height:0;padding:24px 18px}.times-head{align-items:flex-start}.mode-toggle button{padding:8px 10px;font-size:14px}.time-list{grid-template-columns:repeat(2,minmax(0,1fr));overflow:visible}.time-button{min-height:54px;font-size:18px}.form-panel{padding:28px 20px}.form-grid{grid-template-columns:1fr}.field.full{grid-column:auto}.form-actions{align-items:stretch;flex-direction:column}.submit-button{width:100%}}
    /* MIMO V4.1 visual system */
    :root{--bg:#000;--panel:#000;--panel-2:#000;--text:#fff;--muted:rgba(255,255,255,.70);--dim:rgba(255,255,255,.42);--line:rgba(255,255,255,.10);--line-soft:#292929;--tile:transparent;--tile-hover:rgba(255,255,255,.06);--radius:0;--focus:#fff;--ease:cubic-bezier(.16,1,.3,1)}
    body{padding:10px;background:#000;font-family:"Inter 18pt",Inter,Arial,sans-serif;font-size:14px;font-weight:300}
    .booking-shell{width:100%;height:calc(100dvh - 20px);min-height:680px;border-color:var(--line);border-radius:0;background:#000;box-shadow:none}
    .info-panel,.calendar-panel,.times-panel,.form-panel{background:#000}
    .tech-header{height:122px;display:grid;grid-template-columns:1fr auto;align-content:space-between;padding:18px 20px;border-bottom:1px solid var(--line);font-family:"Cartograph Mono CF",SFMono-Regular,Consolas,Menlo,monospace;font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--dim)}
    .tech-header strong{font-family:"Inter 18pt",Inter,Arial,sans-serif;font-size:22px;font-weight:600;letter-spacing:0;color:var(--text)}
    .tech-status{display:flex;align-items:center;gap:8px}.tech-status:before{content:"";width:5px;height:5px;background:#fff}.tech-coord{grid-column:1/-1;display:flex;justify-content:space-between;border-top:1px solid var(--line);padding-top:10px}
    .info-content{padding:40px 32px 28px}.eyebrow{margin-bottom:20px;color:var(--dim);font-family:"Cartograph Mono CF",SFMono-Regular,Consolas,Menlo,monospace;font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase}
    h1{margin-bottom:18px;font-size:30px;font-weight:300;line-height:1.1;letter-spacing:0}.description{color:var(--muted);font-size:14px;font-weight:300;line-height:1.8}.description+p{margin-top:20px}
    .meta{gap:16px;color:var(--dim);font-family:"Cartograph Mono CF",SFMono-Regular,Consolas,Menlo,monospace;font-size:11px;font-weight:600;letter-spacing:.04em}.meta-row{gap:8px}.icon{width:18px;height:18px;font-size:16px}.meet-icon{filter:grayscale(1);opacity:.8}.timezone-select{color:var(--dim);font-family:inherit;font-size:11px}
    .contact-button,.submit-button{position:relative;border:1px solid var(--line);border-radius:0;background:transparent;color:#fff;font-family:"Cartograph Mono CF",SFMono-Regular,Consolas,Menlo,monospace;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;transition:border-color .22s var(--ease),color .22s var(--ease),transform .22s var(--ease)}
    .contact-button{padding:13px 18px}.contact-button:hover,.submit-button:hover{border-color:#fff;background:transparent;color:#fff;transform:translateY(-2px)}
    .contact-button:before,.contact-button:after,.submit-button:before,.submit-button:after{content:"";position:absolute;width:5px;height:5px;border-color:#fff;pointer-events:none}.contact-button:before,.submit-button:before{left:-1px;top:-1px;border-left:1px solid;border-top:1px solid}.contact-button:after,.submit-button:after{right:-1px;bottom:-1px;border-right:1px solid;border-bottom:1px solid}
    .calendar-panel{padding:38px 40px}.calendar-head{margin-bottom:28px}.month-title,.selected-date{font-family:"Cartograph Mono CF",SFMono-Regular,Consolas,Menlo,monospace;font-size:12px;font-weight:600;letter-spacing:.10em;text-transform:uppercase}.month-title span{color:var(--dim);font-weight:600}.icon-button{width:38px;height:38px;border-radius:0;color:var(--dim);font-family:monospace;font-size:24px}.icon-button:hover{background:transparent;color:#fff}
    .weekdays{color:var(--dim);font-family:"Cartograph Mono CF",SFMono-Regular,Consolas,Menlo,monospace;font-size:10px;font-weight:600;letter-spacing:.08em}.day,.blank{border-radius:0;color:var(--dim);font-family:"Cartograph Mono CF",SFMono-Regular,Consolas,Menlo,monospace;font-size:12px}.day.available{border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.07);color:#fff;font-weight:600}.day.available:not(.selected):before{content:"";position:absolute;top:8px;right:8px;width:4px;height:4px;background:rgba(255,255,255,.55)}.day.available:hover{z-index:1;border-color:#fff;background:rgba(255,255,255,.14);color:#fff;transform:none}.day.selected,.day.selected:hover{border-color:#fff;background:#fff;color:#000}.day.selected:before{display:none}.day.today:after{width:4px;height:4px;border-radius:0}
    .times-panel{padding:30px 28px;background:#000}.time-list{gap:8px;padding-right:0;scrollbar-color:var(--line-soft) transparent}.time-button{min-height:52px;border-color:var(--line);border-radius:0;background:transparent;color:var(--muted);font-family:"Cartograph Mono CF",SFMono-Regular,Consolas,Menlo,monospace;font-size:12px;font-weight:600;letter-spacing:.06em;transition:border-color .22s var(--ease),color .22s var(--ease)}.time-button:hover{border-color:rgba(255,255,255,.5);background:transparent;color:#fff;transform:none}.time-button[aria-pressed="true"]{border-color:#fff;background:#fff;color:#000}.summary{border-color:var(--line);color:var(--dim);font-family:"Cartograph Mono CF",SFMono-Regular,Consolas,Menlo,monospace;font-size:10px}
    .chosen-meta{border-color:var(--line);color:var(--muted);font-family:"Cartograph Mono CF",SFMono-Regular,Consolas,Menlo,monospace;font-size:11px}.form-panel{padding:40px 48px 52px}.form-head h2{font-size:30px;font-weight:300}.back-button{border-color:var(--line);border-radius:0;background:transparent;color:var(--muted)}.back-button:hover{border-color:#fff;color:#fff}.field{gap:8px}.field label,.field legend{font-family:"Cartograph Mono CF",SFMono-Regular,Consolas,Menlo,monospace;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase}.field input,.field select,.field textarea{border-color:var(--line);border-radius:0;background:transparent;color:#fff;padding:14px 14px;font-family:"Inter 18pt",Inter,Arial,sans-serif;font-size:14px;font-weight:300}.field input:focus,.field select:focus,.field textarea:focus{border-color:#fff;box-shadow:none}.phone-row select,.phone-row input{border-radius:0}.radio-options label{font-family:"Inter 18pt",Inter,Arial,sans-serif;font-size:14px;font-weight:300;letter-spacing:0;text-transform:none}.radio-options input{accent-color:#fff}.optional,.legal,.form-error{font-family:"Cartograph Mono CF",SFMono-Regular,Consolas,Menlo,monospace;font-size:9px}.submit-button{padding:15px 22px}.success-state h2{font-size:30px;font-weight:300}.success-state p{color:var(--dim);font-family:"Cartograph Mono CF",SFMono-Regular,Consolas,Menlo,monospace;font-size:11px}
    @media(max-width:1099px){body{padding:10px}.booking-shell{height:auto;min-height:calc(100dvh - 20px)}.tech-header{height:100%}}
    @media(max-width:719px){body{padding:8px}.booking-shell{min-height:calc(100dvh - 16px);border-radius:0}.tech-header{height:92px}.info-content{padding:28px 20px}.calendar-panel{padding:28px 14px}.day,.blank{border-radius:0}.form-panel{padding:28px 20px}}
    @media(prefers-reduced-motion:reduce){*,*:before,*:after{scroll-behavior:auto!important;transition:none!important}}
  </style>
</head>
<body>
  <main class="booking-shell" aria-label="预约探索沟通">
    <section class="info-panel" aria-labelledby="booking-title">
      <div class="tech-header" aria-hidden="true"><strong>MIMO</strong><span class="tech-status">Available</span><div class="tech-coord"><span>Module 04</span><span>Interview / 2026</span></div></div>
      <div class="info-content">
        <p class="eyebrow">MIMO / INTERVIEW</p>
        <h1 id="booking-title">和我预约面试</h1>
        <p class="description">选择一个方便的时间，与我进行一场 30 分钟的线上面试沟通。</p>
        <p class="description">我们可以聊聊我的项目经历、设计思路与合作方式，也欢迎你提前备注希望重点了解的内容。</p>
        <div class="chosen-meta" id="chosen-meta"></div>
        <a class="contact-button" href="https://t.me/Mimomo1" target="_blank" rel="noopener noreferrer">直接联系 Telegram ↗</a>
        <div class="meta">
          <div class="meta-row"><span class="icon" aria-hidden="true">◷</span><span>30分钟</span></div>
          <div class="meta-row"><span class="meet-icon" aria-hidden="true"></span><span>Google Meet</span></div>
          <div class="meta-row timezone-row"><span class="icon" aria-hidden="true">◎</span><label for="timezone" class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">选择时区</label><select class="timezone-select" id="timezone"><option value="Asia/Shanghai">中国标准时间 UTC+8</option><option value="Asia/Tokyo">日本标准时间 UTC+9</option><option value="Europe/London">英国时间 UTC±0</option><option value="America/New_York">美国东部时间 UTC-5</option><option value="America/Los_Angeles">美国西部时间 UTC-8</option></select></div>
        </div>
      </div>
    </section>
    <section class="calendar-panel" aria-label="选择日期">
      <header class="calendar-head">
        <div class="month-title" id="month-title"></div>
        <div class="month-nav">
          <button class="icon-button" id="prev-month" type="button" aria-label="上个月">‹</button>
          <button class="icon-button" id="next-month" type="button" aria-label="下个月">›</button>
        </div>
      </header>
      <div class="weekdays" aria-hidden="true"><div class="weekday">周日</div><div class="weekday">周一</div><div class="weekday">周二</div><div class="weekday">周三</div><div class="weekday">周四</div><div class="weekday">周五</div><div class="weekday">周六</div></div>
      <div class="calendar-grid" id="calendar-grid" role="grid" aria-labelledby="month-title"></div>
    </section>
    <section class="times-panel" aria-label="选择时间">
      <header class="times-head">
        <div class="selected-date" id="selected-date">请选择日期</div>
      </header>
      <div class="time-list" id="time-list"></div>
      <div class="summary" id="summary" aria-live="polite"></div>
    </section>
    <section class="form-panel" aria-label="填写预约信息">
      <div id="form-view">
        <header class="form-head"><button class="back-button" id="back-to-calendar" type="button" aria-label="返回日期选择">←</button><h2>填写预约信息</h2></header>
        <form id="booking-form" novalidate>
          <div class="form-grid">
            <div class="field"><label for="name">姓名 *</label><input id="name" name="name" autocomplete="name" required placeholder="你的姓名"></div>
            <div class="field"><label for="email">邮箱地址 *</label><input id="email" name="email" type="email" autocomplete="email" required placeholder="you@company.com"></div>
            <div class="field full"><label for="phone">电话号码 <span class="optional">（非必填）</span></label><div class="phone-row"><select aria-label="国家区号" name="country"><option value="+86">🇨🇳 +86</option><option value="+1">🇺🇸 +1</option><option value="+44">🇬🇧 +44</option></select><input id="phone" name="phone" type="tel" autocomplete="tel" placeholder="手机号码"></div></div>
            <div class="field full"><label for="company">公司名称 *</label><input id="company" name="company" required placeholder="请输入公司名称"></div>
            <fieldset class="field full radio-group"><legend>你是这个项目的主要联系人吗？ *</legend><div class="radio-options"><label><input type="radio" name="primary" value="yes" required>是</label><label><input type="radio" name="primary" value="no">否</label></div></fieldset>
            <div class="field full"><label for="notes">附加备注</label><textarea id="notes" name="notes" placeholder="请分享任何有助于筹备我们会议的内容。"></textarea></div>
          </div>
          <p class="form-error" id="form-error" role="alert"></p>
          <div class="form-actions"><p class="legal">继续即表示你同意本演示的服务条款和隐私政策。此复刻不会发送或保存任何数据。</p><button class="submit-button" type="submit">确认预约</button></div>
        </form>
      </div>
      <div class="success-state" id="success-state" aria-live="polite"><div><div style="font-size:56px">✓</div><h2>预约已确认</h2><p id="success-copy"></p><button class="back-button" id="start-over" type="button" aria-label="重新选择">↺</button></div></div>
    </section>
  </main>
  <script>
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 12);
    const state = { viewDate:new Date(now.getFullYear(),now.getMonth(),1,12), selectedDate:null, selectedTime:null, timezone:'Asia/Shanghai', booked:new Set(), availabilityLoading:false, availabilityError:false };
    const monthNames=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
    const grid=document.querySelector('#calendar-grid'), monthTitle=document.querySelector('#month-title'), dateTitle=document.querySelector('#selected-date'), timeList=document.querySelector('#time-list'), summary=document.querySelector('#summary');

    function keyOf(date){return `${date.getFullYear()}-${date.getMonth()+1}-${date.getDate()}`}
    function apiDate(date){return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`}
    function sameDate(a,b){return a&&b&&keyOf(a)===keyOf(b)}
    function isAvailable(date){const day=date.getDay();return date>=today&&day>=1&&day<=5}
    function getAvailableTimes(date){if(!date||!isAvailable(date))return[];return['14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30','18:00','18:30','19:00']}
    function formatTime(value){
      if(!value||state.timezone==='Asia/Shanghai'||!state.selectedDate)return value;
      const [hour,minute]=value.split(':').map(Number);
      const instant=new Date(Date.UTC(state.selectedDate.getFullYear(),state.selectedDate.getMonth(),state.selectedDate.getDate(),hour-8,minute));
      return new Intl.DateTimeFormat('zh-CN',{timeZone:state.timezone,hour:'2-digit',minute:'2-digit',hourCycle:'h23'}).format(instant);
    }
    function firstAvailable(year,month){const last=new Date(year,month+1,0,12).getDate();for(let d=1;d<=last;d++){const date=new Date(year,month,d,12);if(isAvailable(date))return date}return null}
    function renderCalendar(){
      const y=state.viewDate.getFullYear(),m=state.viewDate.getMonth(),firstDay=new Date(y,m,1,12).getDay(),days=new Date(y,m+1,0,12).getDate();
      monthTitle.innerHTML=`${monthNames[m]} <span>${y}</span>`;grid.replaceChildren();
      for(let i=0;i<42;i++){
        if(i<firstDay||i>=firstDay+days){const blank=document.createElement('span');blank.className='blank';blank.setAttribute('aria-hidden','true');grid.append(blank);continue}
        const day=i-firstDay+1,date=new Date(y,m,day,12),button=document.createElement('button'),available=isAvailable(date),selected=sameDate(date,state.selectedDate);
        button.type='button';button.className=`day${available?' available':''}${selected?' selected':''}${sameDate(date,today)?' today':''}`;button.textContent=day;button.disabled=!available;button.setAttribute('aria-label',`${y}年${m+1}月${day}日，${available?'可预约':'不可预约'}`);button.setAttribute('aria-pressed',String(selected));
        if(available)button.addEventListener('click',()=>selectDate(date));grid.append(button)
      }
    }
    async function selectDate(date){state.selectedDate=date;state.selectedTime=null;state.availabilityLoading=true;state.availabilityError=false;render();await loadAvailability()}
    async function loadAvailability(){
      if(!state.selectedDate)return;
      state.availabilityLoading=true;state.availabilityError=false;renderTimes();
      try{const response=await fetch(`/api/availability?date=${apiDate(state.selectedDate)}`,{headers:{accept:'application/json'}});if(!response.ok)throw new Error('availability');const data=await response.json();state.booked=new Set(data.booked||[])}
      catch(error){state.booked=new Set();state.availabilityError=true}
      finally{state.availabilityLoading=false;renderTimes()}
    }
    function renderTimes(){
      if(!state.selectedDate){dateTitle.textContent='请选择日期';timeList.innerHTML='<div class="empty">请先选择可预约日期</div>';summary.textContent='';return}
      dateTitle.textContent=`周${'日一二三四五六'[state.selectedDate.getDay()]} ${state.selectedDate.getDate()}`;timeList.replaceChildren();
      if(state.availabilityLoading){timeList.innerHTML='<div class="empty">正在检查可预约时间…</div>';summary.textContent='';return}
      if(state.availabilityError){timeList.innerHTML='<button class="time-button" id="retry-availability" type="button">读取失败，点击重试</button>';document.querySelector('#retry-availability').addEventListener('click',loadAvailability);summary.textContent='为避免时间冲突，读取成功前无法预约';return}
      const times=getAvailableTimes(state.selectedDate);if(!times.length){timeList.innerHTML='<div class="empty">暂无可预约时间</div>';return}
      times.forEach(time=>{const button=document.createElement('button'),booked=state.booked.has(time);button.type='button';button.className='time-button';button.textContent=booked?`${formatTime(time)} · 已预约`:formatTime(time);button.disabled=booked;button.setAttribute('aria-label',booked?`${formatTime(time)}，已预约`:formatTime(time));button.setAttribute('aria-pressed',String(state.selectedTime===time));if(!booked)button.addEventListener('click',()=>{state.selectedTime=time;renderTimes();openForm()});timeList.append(button)});
      summary.textContent=state.selectedTime?`已选择：${state.selectedDate.getFullYear()}年${state.selectedDate.getMonth()+1}月${state.selectedDate.getDate()}日 · ${formatTime(state.selectedTime)} · 30分钟`:'请选择一个时间段';
    }
    function render(){renderCalendar();renderTimes()}
    function selectedDateCopy(){return `${state.selectedDate.getFullYear()}年${state.selectedDate.getMonth()+1}月${state.selectedDate.getDate()}日星期${'日一二三四五六'[state.selectedDate.getDay()]}`}
    function openForm(){
      document.querySelector('.booking-shell').classList.add('form-stage');
      document.querySelector('#chosen-meta').innerHTML=`<strong>▣ ${selectedDateCopy()}</strong>${formatTime(state.selectedTime)}–${formatTime(addMinutes(state.selectedTime,30))}`;
      document.querySelector('#form-view').hidden=false;document.querySelector('#success-state').classList.remove('visible');
      document.querySelector('#name').focus();
    }
    function addMinutes(value,minutes){const [h,m]=value.split(':').map(Number),total=h*60+m+minutes;return `${String(Math.floor(total/60)%24).padStart(2,'0')}:${String(total%60).padStart(2,'0')}`}
    function closeForm(){document.querySelector('.booking-shell').classList.remove('form-stage');document.querySelector('#form-error').textContent='';document.querySelector('.time-button[aria-pressed="true"]')?.focus()}
    document.querySelector('#prev-month').addEventListener('click',()=>{state.viewDate=new Date(state.viewDate.getFullYear(),state.viewDate.getMonth()-1,1,12);selectDate(firstAvailable(state.viewDate.getFullYear(),state.viewDate.getMonth()))});
    document.querySelector('#next-month').addEventListener('click',()=>{state.viewDate=new Date(state.viewDate.getFullYear(),state.viewDate.getMonth()+1,1,12);selectDate(firstAvailable(state.viewDate.getFullYear(),state.viewDate.getMonth()))});
    document.querySelector('#back-to-calendar').addEventListener('click',closeForm);
    document.querySelector('#timezone').addEventListener('change',event=>{state.timezone=event.target.value;state.selectedTime=null;renderTimes()});
    document.querySelector('#booking-form').addEventListener('submit',async event=>{
      event.preventDefault();const form=event.currentTarget,error=document.querySelector('#form-error');
      if(!form.checkValidity()){error.textContent='请填写所有必填项目，并检查邮箱格式。';form.reportValidity();return}
      const submit=form.querySelector('button[type="submit"]'),data=new FormData(form);submit.disabled=true;submit.textContent='正在确认…';error.textContent='';
      try{const response=await fetch('/api/book',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({date:apiDate(state.selectedDate),time:state.selectedTime,name:data.get('name'),email:data.get('email'),phone:`${data.get('country')} ${data.get('phone')}`.trim(),company:data.get('company'),primary:data.get('primary'),notes:data.get('notes')})});const result=await response.json();if(response.status===409){closeForm();state.selectedTime=null;summary.textContent=result.error;await loadAvailability();return}if(!response.ok)throw new Error(result.error||'预约失败');document.querySelector('#form-view').hidden=true;document.querySelector('#success-state').classList.add('visible');document.querySelector('#success-copy').textContent=`${selectedDateCopy()} · ${formatTime(state.selectedTime)} · Google Meet`}
      catch(requestError){error.textContent=requestError.message||'预约暂时失败，请稍后重试'}finally{submit.disabled=false;submit.textContent='确认预约'}
    });
    document.querySelector('#start-over').addEventListener('click',()=>{document.querySelector('#booking-form').reset();closeForm();document.querySelector('#form-view').hidden=false;document.querySelector('#success-state').classList.remove('visible')});
    state.selectedDate=firstAvailable(state.viewDate.getFullYear(),state.viewDate.getMonth());render();loadAvailability();
  </script>
</body>
</html>

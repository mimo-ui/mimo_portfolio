<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Vibe Coding / Motion Lab</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #070809;
      --line: rgba(255,255,255,.13);
      --muted: rgba(255,255,255,.48);
      --ease: cubic-bezier(.16,1,.3,1);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); }
    body {
      color: #fff;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      background-image:
        radial-gradient(circle at 15% 20%, rgba(255,255,255,.045), transparent 28%),
        radial-gradient(circle at 85% 75%, rgba(255,255,255,.025), transparent 32%),
        linear-gradient(rgba(255,255,255,.012) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.012) 1px, transparent 1px);
      background-size: auto, auto, 4px 4px, 4px 4px;
    }
    .vibe-tabs {
      position: fixed;
      inset: 0 0 auto;
      z-index: 20;
      display: flex;
      min-width: 0;
      height: 58px;
      padding: 9px clamp(10px, 2vw, 22px);
      gap: 8px;
      overflow-x: auto;
      border-bottom: 1px solid var(--line);
      background: rgba(7,8,9,.86);
      backdrop-filter: blur(16px);
      scrollbar-width: none;
    }
    .vibe-tabs::-webkit-scrollbar { display: none; }
    .vibe-tab {
      flex: 1 0 max-content;
      min-width: 118px;
      height: 40px;
      padding: 0 16px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.018);
      color: var(--muted);
      font: 700 10px/1 "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      letter-spacing: .13em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color .2s ease, background .2s ease, border-color .2s ease;
    }
    .vibe-tab:hover { color: rgba(255,255,255,.82); border-color: rgba(255,255,255,.28); }
    .vibe-tab[aria-selected="true"] { color: #070809; background: #fff; border-color: #fff; }
    .vibe-tab:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }
    .vibe-panel {
      position: fixed;
      inset: 58px 0 0;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translateY(12px);
      transition: opacity .24s ease, transform .42s var(--ease), visibility .24s ease;
    }
    .vibe-panel.is-active { opacity: 1; visibility: visible; pointer-events: auto; transform: none; }
    .vibe-panel iframe { display: block; width: 100%; height: 100%; border: 0; background: #050505; }
    .vibe-status {
      position: fixed;
      right: 16px;
      bottom: 12px;
      z-index: 18;
      color: rgba(255,255,255,.38);
      font-size: 9px;
      letter-spacing: .12em;
      pointer-events: none;
    }
    .file-protocol-notice {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      place-items: center;
      padding: 24px;
      background: #070809;
    }
    .file-protocol-notice__card {
      width: min(560px, 100%);
      padding: clamp(28px, 7vw, 56px);
      border: 1px solid var(--line);
      background: rgba(255,255,255,.025);
    }
    .file-protocol-notice__eyebrow {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 10px;
      letter-spacing: .14em;
      text-transform: uppercase;
    }
    .file-protocol-notice h1 { margin: 0 0 18px; font-size: clamp(24px, 6vw, 42px); line-height: 1.08; }
    .file-protocol-notice p { margin: 0; color: rgba(255,255,255,.66); font: 13px/1.8 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .file-protocol-notice code { color: #fff; font-family: inherit; }
    body.is-file-protocol .file-protocol-notice { display: grid; }
    body.is-file-protocol .vibe-tabs,
    body.is-file-protocol .vibe-panel,
    body.is-file-protocol .vibe-status { display: none; }
    @media (max-width: 560px) {
      .vibe-tabs { height: 54px; padding: 7px 8px; gap: 6px; }
      .vibe-tab { flex: 0 0 auto; min-width: 106px; height: 40px; padding: 0 12px; font-size: 9px; }
      .vibe-panel { inset-block-start: 54px; }
    }
    @media (prefers-reduced-motion: reduce) {
      .vibe-panel, .vibe-tab { transition: none; }
    }
  </style>
</head>
<body>
  <section class="file-protocol-notice" role="alert">
    <div class="file-protocol-notice__card">
      <p class="file-protocol-notice__eyebrow">Vibe Coding / Local Preview</p>
      <h1>请用双击启动器打开</h1>
      <p>动态实验需要本地服务才能加载。请返回作品集文件夹，双击 <code>双击打开作品集.command</code>，浏览器会自动打开完整效果。</p>
    </div>
  </section>

  <nav class="vibe-tabs" role="tablist" aria-label="Vibe Coding experiments">
    <button class="vibe-tab" id="tab-liquid" type="button" role="tab" aria-controls="panel-liquid" aria-selected="false" data-screen="liquid">Liquid</button>
    <button class="vibe-tab" id="tab-astrodither" type="button" role="tab" aria-controls="panel-astrodither" aria-selected="true" data-screen="astrodither">Astro Dither</button>
    <button class="vibe-tab" id="tab-utopia" type="button" role="tab" aria-controls="panel-utopia" aria-selected="false" data-screen="utopia">Utopia</button>
    <button class="vibe-tab" id="tab-widgets" type="button" role="tab" aria-controls="panel-widgets" aria-selected="false" data-screen="widgets">Widgets</button>
  </nav>

  <section class="vibe-panel" id="panel-liquid" role="tabpanel" aria-labelledby="tab-liquid" aria-hidden="true">
    <iframe data-src="vibe-coding/liquid/index.html" title="Liquid Vibe Coding experiment" loading="lazy"></iframe>
  </section>
  <section class="vibe-panel is-active" id="panel-astrodither" role="tabpanel" aria-labelledby="tab-astrodither" aria-hidden="false">
    <iframe data-src="vibe-coding/astrodither/index.html" title="Astro Dither Vibe Coding experiment" allow="autoplay; fullscreen; xr-spatial-tracking"></iframe>
  </section>
  <section class="vibe-panel" id="panel-utopia" role="tabpanel" aria-labelledby="tab-utopia" aria-hidden="true">
    <iframe data-src="vibe-coding/utopia/index.html" title="Utopia Vibe Coding experiment" loading="lazy"></iframe>
  </section>
  <section class="vibe-panel" id="panel-widgets" role="tabpanel" aria-labelledby="tab-widgets" aria-hidden="true">
    <iframe data-src="vibe-coding/widgets/index.html" title="Widgets Vibe Coding experiment" loading="lazy"></iframe>
  </section>
  <div class="vibe-status" aria-hidden="true">SCROLL / SWIPE / ARROW KEYS</div>

  <script>
    (() => {
      if (window.location.protocol === "file:") {
        document.body.classList.add("is-file-protocol");
        return;
      }
      const order = ["liquid", "astrodither", "utopia", "widgets"];
      const internallyControlled = new Set(["utopia", "widgets"]);
      const tabs = new Map([...document.querySelectorAll(".vibe-tab")].map((tab) => [tab.dataset.screen, tab]));
      const panels = new Map(order.map((name) => [name, document.getElementById(`panel-${name}`)]));
      const frames = new Map(order.map((name) => [name, panels.get(name).querySelector("iframe")]));
      let active = "astrodither";
      let inputLocked = false;
      let touchStartY = 0;

      function syncFrameActivity() {
        frames.forEach((frame, name) => {
          if (!frame.getAttribute("src") || !frame.contentWindow) return;
          frame.contentWindow.postMessage({ type: "vibe-frame-active", active: name === active }, "*");
        });
      }

      function activate(name, { focusTab = false } = {}) {
        if (!order.includes(name)) return;
        active = name;
        tabs.forEach((tab, tabName) => {
          const selected = tabName === name;
          tab.setAttribute("aria-selected", String(selected));
          tab.tabIndex = selected ? 0 : -1;
        });
        panels.forEach((panel, panelName) => {
          const selected = panelName === name;
          panel.classList.toggle("is-active", selected);
          panel.setAttribute("aria-hidden", String(!selected));
        });
        const frame = frames.get(name);
        if (!frame.getAttribute("src")) frame.src = frame.dataset.src;
        if (focusTab) tabs.get(name).focus();
        tabs.get(name).scrollIntoView({ behavior: "smooth", block: "nearest", inline: "nearest" });
        syncFrameActivity();
      }

      function step(direction, focusTab = false) {
        const index = order.indexOf(active);
        const nextIndex = Math.min(order.length - 1, Math.max(0, index + direction));
        if (nextIndex === index) return;
        activate(order[nextIndex], { focusTab });
      }

      function handleKey(event) {
        if (event.key === "Escape") {
          window.parent.postMessage({ type: "vibe-coding-close" }, window.location.origin);
          return;
        }
        if (event.key !== "ArrowLeft" && event.key !== "ArrowRight") return;
        event.preventDefault();
        step(event.key === "ArrowRight" ? 1 : -1, true);
      }

      function handleWheel(event) {
        if (inputLocked || Math.abs(event.deltaY) < 24) return;
        event.preventDefault();
        inputLocked = true;
        step(event.deltaY > 0 ? 1 : -1);
        window.setTimeout(() => { inputLocked = false; }, 650);
      }

      function handleTouchStart(event) {
        touchStartY = event.touches[0]?.clientY ?? 0;
      }

      function handleTouchMove(event) {
        if (inputLocked) return;
        const delta = touchStartY - (event.touches[0]?.clientY ?? touchStartY);
        if (Math.abs(delta) < 48) return;
        event.preventDefault();
        inputLocked = true;
        step(delta > 0 ? 1 : -1);
        window.setTimeout(() => { inputLocked = false; }, 650);
      }

      function bindFrame(name, frame) {
        try {
          const frameDocument = frame.contentDocument;
          if (!frameDocument || frame.dataset.vibeControlsBound === "true") return;
          frame.dataset.vibeControlsBound = "true";
          frameDocument.addEventListener("keydown", handleKey, { capture: true });
          if (!internallyControlled.has(name)) {
            frameDocument.addEventListener("wheel", handleWheel, { passive: false, capture: true });
            frameDocument.addEventListener("touchstart", handleTouchStart, { passive: true, capture: true });
            frameDocument.addEventListener("touchmove", handleTouchMove, { passive: false, capture: true });
          }
          syncFrameActivity();
        } catch (error) {
          console.warn("Vibe controls could not bind to experiment frame.", error);
        }
      }

      tabs.forEach((tab, name) => {
        tab.addEventListener("click", () => activate(name));
      });
      frames.forEach((frame, name) => frame.addEventListener("load", () => bindFrame(name, frame)));
      window.addEventListener("message", (event) => {
        if (!event.data || event.data.type !== "vibe-screen-step") return;
        if (event.data.source !== active) return;
        const activeFrame = frames.get(active);
        if (!activeFrame || event.source !== activeFrame.contentWindow) return;
        step(Number(event.data.direction) > 0 ? 1 : -1);
      });
      window.addEventListener("keydown", handleKey);
      window.addEventListener("wheel", handleWheel, { passive: false });
      window.addEventListener("touchstart", handleTouchStart, { passive: true });
      window.addEventListener("touchmove", handleTouchMove, { passive: false });

      activate(active);
      window.__vibeCoding = {
        get active() { return active; },
        set: activate,
        next: () => step(1),
        previous: () => step(-1),
      };
    })();
  </script>
</body>
</html>
